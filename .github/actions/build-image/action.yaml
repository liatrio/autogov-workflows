name: Build Image Composite Action

description: >-
  A composite action that is placed in ./.github/actions/build-image/action.yaml whereby
  ./.github/workflows/rw-<permissions_path>-attest-image.yaml will trigger this action to build an image. The steps
  can be adjusted per the user's need just as long as the output is the image digest.

inputs:
  subject-name:
    description: The name for the image.
    required: true
    default: ${{ github.repository }}
  registry:
    description: Container registry to push image.
    required: false
    default: ghcr.io
  github-token:
    description: >
      The GitHub token set throughout the reusable workflow including the composite (build) action.
    required: false
    default: ''
outputs:
  image-digest:
    description: The image digest of the image that was built from the build-image job.
    value: ${{ steps.build-image.outputs.digest }}
  subject-name-sanitized:
    description: The sanitized (lowercase) subject name for OCI compliance.
    value: ${{ steps.sanitize.outputs.name }}

runs:
  using: composite
  steps:
    - name: Sanitize subject name for OCI compliance
      id: sanitize
      shell: bash
      run: echo "name=$(echo '${{ inputs.subject-name }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
    - name: Get Next Semantic Release Tag # premptively tags pushed/registry image w/ release tag
      id: semantic-release
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      uses: go-semantic-release/action@2e9dc4247a6004f8377781bef4cb9dad273a741f # v1.24.1
      with:
        dry: true
        allow-initial-development-versions: true
        github-token: ${{ inputs.github-token || github.token }}
    - name: Image Metadata
      id: meta
      uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
      with:
        images: ${{ format('{0}/{1}', inputs.registry, steps.sanitize.outputs.name) }}
        tags: |
          type=ref,event=branch
          type=sha
          type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
          type=raw,value=${{ steps.semantic-release.outputs.version }},enable=${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
    - name: Set up QEMU
      uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
    - name: Log in to GitHub Container Registry
      uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
      with:
        registry: ${{ inputs.registry }}
        username: ${{ github.actor }}
        password: ${{ inputs.github-token || github.token }}
    - name: Build and push Docker image
      uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
      id: build-image
      with:
        context: .
        file: Dockerfile
        push: true
        platforms: linux/amd64,linux/arm64
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        outputs: type=oci,dest=/tmp/image.tar
        cache-from: type=gha
        cache-to: type=gha,mode=max
