name: Update Certificate Identities

on:
  workflow_run:
    workflows:
      - 'Build Entrypoint Caller Workflow'
    types:
      - completed
    branches:
      - 'main'

permissions: {}

jobs:
  update-cert-identities:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      id-token: write
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0
          token: ${{ github.token }}
          fetch-tags: true
      - name: Generate STS Token
        uses: octo-sts/action@d6c70ad3b9ac85df6da6b9749014d7283987cfec # v1.0.3
        id: octo-sts
        with:
          scope: ${{ github.repository }}
          identity: release-ops
      - name: Check if update is needed
        id: check-update
        run: |
          TAG_SHA=$(git rev-list -n 1 $(git describe --tags --abbrev=0))

          if grep -q "$TAG_SHA" cert-identities.json; then
            echo "Current tag SHA already exists in cert-identities.json. No update needed."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "Tag SHA not found in cert-identities.json. Update needed."
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
      - name: Get release version from tag
        id: get-version
        if: steps.check-update.outputs.skip != 'true'
        run: |
          LATEST_VERSION=$(git describe --tags --abbrev=0 | sed 's/^v//')
          echo "VERSION=$LATEST_VERSION" >> $GITHUB_ENV
          echo "version=$LATEST_VERSION" >> $GITHUB_OUTPUT
          echo "Latest version: $LATEST_VERSION"
      - name: Get tag SHA
        id: get-tag-sha
        if: steps.check-update.outputs.skip != 'true'
        run: |
          TAG=$(git describe --tags --abbrev=0)
          TAG_SHA=$(git rev-list -n 1 $TAG)
          echo "TAG_SHA=$TAG_SHA" >> $GITHUB_ENV
          echo "tag_sha=$TAG_SHA" >> $GITHUB_OUTPUT
          echo "Tag SHA: $TAG_SHA"
      - name: Update certificate identities
        if: steps.check-update.outputs.skip != 'true'
        run: |
          export COMMIT_SHA="$TAG_SHA"
          ./scripts/update-cert-identities.sh "$VERSION"

      - name: Commit updated certificate identities
        if: steps.check-update.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ steps.octo-sts.outputs.token }}
        run: |
          if ! git diff --quiet cert-identities.json; then
            # Get current main branch SHA
            MAIN_SHA=$(gh api /repos/${{ github.repository }}/git/ref/heads/main --jq '.object.sha')

            # Get base tree from current commit
            BASE_TREE=$(gh api /repos/${{ github.repository }}/git/commits/${MAIN_SHA} --jq '.tree.sha')

            # Create blob for updated file
            BLOB_SHA=$(gh api /repos/${{ github.repository }}/git/blobs \
              -f content="$(base64 -w0 cert-identities.json)" \
              -f encoding="base64" \
              --jq '.sha')

            # Create new tree with updated file
            NEW_TREE=$(gh api /repos/${{ github.repository }}/git/trees \
              -f base_tree="${BASE_TREE}" \
              -f 'tree[][path]=cert-identities.json' \
              -f 'tree[][mode]=100644' \
              -f 'tree[][type]=blob' \
              -f "tree[][sha]=${BLOB_SHA}" \
              --jq '.sha')

            # Create commit via API (bypasses signature requirement for authorized apps)
            NEW_COMMIT=$(gh api /repos/${{ github.repository }}/git/commits \
              -f message="chore(release): update certificate identities for v${{ steps.get-version.outputs.version }} 🤖 [skip ci]" \
              -f tree="${NEW_TREE}" \
              -f 'parents[]'="${MAIN_SHA}" \
              --jq '.sha')

            # Update main branch reference
            gh api /repos/${{ github.repository }}/git/refs/heads/main \
              -X PATCH \
              -f sha="${NEW_COMMIT}" \
              -F force=false

            echo "✅ Successfully committed updated certificate identities via API"
          else
            echo "ℹ️ No changes to certificate identities file"
          fi
      - name: Upload Certificate Identities as Release Asset
        if: steps.check-update.outputs.skip != 'true' && steps.get-version.outputs.version != ''
        env:
          GH_TOKEN: ${{ steps.octo-sts.outputs.token }}
        run: |
          # Verify cert-identities.json exists
          if [ ! -f cert-identities.json ]; then
            echo "ERROR: cert-identities.json not found"
            exit 1
          fi

          # Verify release exists before uploading
          if gh release view "v${{ steps.get-version.outputs.version }}" >/dev/null 2>&1; then
            gh release upload "v${{ steps.get-version.outputs.version }}" cert-identities.json --clobber
          else
            echo "WARNING: Release v${{ steps.get-version.outputs.version }} not found, skipping upload"
            exit 0
          fi
