name: Update Certificate Identities

on:
  workflow_run:
    workflows:
      - 'Build Entrypoint Caller Workflow'
    types:
      - completed
    branches:
      - 'main'

jobs:
  update-cert-identities:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      id-token: write
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          token: ${{ github.token }}
          persist-credentials: false

      - name: Generate STS Token
        uses: octo-sts/action@6177b4481c00308b3839969c3eca88c96a91775f # v1.0.0
        id: octo-sts
        with:
          scope: ${{ github.repository }}
          identity: release-ops

      - name: Get latest release version
        id: get-version
        run: |
          git fetch --tags

          LATEST_VERSION=$(git describe --tags --abbrev=0 | sed 's/^v//')
          echo "VERSION=$LATEST_VERSION" >> $GITHUB_ENV
          echo "version=$LATEST_VERSION" >> $GITHUB_OUTPUT
          echo "Latest version: $LATEST_VERSION"

      - name: Get tag SHA
        id: get-tag-sha
        run: |
          TAG=$(git describe --tags --abbrev=0)
          TAG_SHA=$(git rev-list -n 1 $TAG)
          echo "TAG_SHA=$TAG_SHA" >> $GITHUB_ENV
          echo "tag_sha=$TAG_SHA" >> $GITHUB_OUTPUT
          echo "Tag SHA: $TAG_SHA"

      - name: Update certificate identities
        run: |
          export COMMIT_SHA="$TAG_SHA"
          ./scripts/update-cert-identities.sh "$VERSION"

      - name: Update files and tag
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        with:
          github-token: ${{ steps.octo-sts.outputs.token }}
          script: |
            const { execSync } = require('child_process');
            const fs = require('fs');

            const modifiedFiles = execSync('git diff --name-only').toString().trim().split('\n').filter(Boolean);

            if (modifiedFiles.length === 0) {
              console.log('No files modified, skipping updates');
              return;
            }

            console.log(`Found ${modifiedFiles.length} modified files: ${modifiedFiles.join(', ')}`);

            const version = process.env.VERSION;
            if (!version) {
              console.log('No version found, skipping file updates and tag creation');
              return;
            }

            const branch = context.ref.replace('refs/heads/', '');
            console.log(`Using branch: ${branch}`);

            try {
              const tagSha = process.env.TAG_SHA;
              if (!tagSha) {
                console.error('❌ ERROR: TAG_SHA environment variable is not set');
                process.exit(1);
              }
              
              const { data: commitData } = await github.rest.git.getCommit({
                owner: context.repo.owner,
                repo: context.repo.repo,
                commit_sha: tagSha
              });
              const baseTreeSha = commitData.tree.sha;

              const treeItems = [];
              let errorCount = 0;
              
              for (const filePath of modifiedFiles) {
                console.log(`Processing file: ${filePath}`);

                try {
                  const content = fs.readFileSync(filePath, 'utf8');
                  
                  const { data: blobData } = await github.rest.git.createBlob({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    content: Buffer.from(content).toString('base64'),
                    encoding: 'base64'
                  });

                  treeItems.push({
                    path: filePath,
                    mode: '100644',
                    type: 'blob',
                    sha: blobData.sha
                  });
                  
                  console.log(`Added ${filePath} to the commit tree`);
                } catch (error) {
                  console.log(`Error processing file ${filePath}: ${error.message}`);
                  errorCount++;
                }
              }

              if (treeItems.length === 0) {
                console.error('❌ ERROR: Failed to process any files');
                process.exit(1);
              }

              if (errorCount > 0) {
                console.warn(`⚠️ WARNING: ${errorCount} files could not be processed`);
              }

              const { data: newTree } = await github.rest.git.createTree({
                owner: context.repo.owner,
                repo: context.repo.repo,
                base_tree: baseTreeSha,
                tree: treeItems
              });

              const { data: newCommit } = await github.rest.git.createCommit({
                owner: context.repo.owner,
                repo: context.repo.repo,
                message: `chore(release): update certificate identities for v${version} 🤖 [skip ci]`,
                tree: newTree.sha,
                parents: [tagSha]
              });

              await github.rest.git.updateRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `heads/${branch}`,
                sha: newCommit.sha
              });

              console.log(`Created single commit ${newCommit.sha} with all file changes`);

              await new Promise(resolve => setTimeout(resolve, 3000));

              console.log(`Updating tag to point to the new commit with updated cert-identities`);
              try {
                await github.rest.git.updateRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: `tags/v${version}`,
                  sha: newCommit.sha,
                  force: true
                });
                console.log(`Tag update complete`);
              } catch (error) {
                console.error(`❌ ERROR: Could not update tag: ${error.message}`);
                process.exit(1);
              }
            } catch (error) {
              console.error(`❌ ERROR: ${error.message}`);
              process.exit(1);
            }
      - name: Upload Results as Release Asset
        if: steps.get-version.outputs.version != ''
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2.2.1
        with:
          files: |
            cert-identities.json
          tag_name: v${{ steps.get-version.outputs.version }}
          token: ${{ steps.octo-sts.outputs.token }}
