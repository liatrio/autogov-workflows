name: Build Entrypoint Caller Workflow

on:
  workflow_dispatch:
  push:
    branches: ['**']
    paths-ignore:
      - .github/workflows/wf-slack-alert.yaml
      - README.md
      - CONTRIBUTING.md
      - catalog-info.yaml
      - renovate.json
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]

permissions: {}

jobs:
  attest-image-hp: #image
    if: github.event.pull_request.draft == false
    permissions:
      id-token: write
      attestations: write
      packages: write
      contents: write
    uses: ./.github/workflows/rw-hp-build-image.yaml
    secrets: inherit
    with:
      subject-name: ghcr.io/${{ github.repository }}
      cert-identity: https://github.com/liatrio/liatrio-gh-autogov-workflows/.github/workflows/rw-hp-attest-image.yaml@${{ github.ref }}

