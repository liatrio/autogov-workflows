name: Release Caller Workflow

on:
  push:
    branches: [main]
    paths-ignore:
      - README.md
      - CONTRIBUTING.md
      - renovate.json

concurrency:
  # serialize main pushes so back-to-back releases don't race the cut;
  # never cancel a run mid-publish (rw-release isn't idempotent-resume)
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  # release-only; the workflow files are attested by attest-workflows.yaml
  release:
    permissions:
      contents: write
      id-token: write
      actions: read
    uses: ./.github/workflows/rw-release.yaml
    secrets: inherit
    with:
      mutations-config: .autogov-release.yaml
