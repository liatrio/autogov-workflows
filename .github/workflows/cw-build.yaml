name: Build Entrypoint Caller Workflow

on:
  workflow_dispatch:
  push:
    branches: ['**']
    paths-ignore:
      - README.md
      - CONTRIBUTING.md
      - catalog-info.yaml
      - renovate.json
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]
    paths-ignore:
      - README.md
      - CONTRIBUTING.md
      - catalog-info.yaml
      - renovate.json

permissions: {}

jobs:
  build-image:
    if: github.event_name != 'pull_request'
    permissions:
      id-token: write
      attestations: write
      packages: write
      contents: write
      actions: read
      artifact-metadata: write
    uses: ./.github/workflows/rw-build-image.yaml
    secrets: inherit
    with:
      subject-name: ${{ github.repository }}
      registry: ghcr.io
      cert-identity: https://github.com/liatrio/liatrio-gh-autogov-workflows/.github/workflows/rw-attest-image.yaml@${{ github.ref }}
      vuln-threshold-critical: '-1'
      vuln-threshold-high: '-1'
      vuln-threshold-medium: '-1'
      vuln-threshold-low: '-1'

