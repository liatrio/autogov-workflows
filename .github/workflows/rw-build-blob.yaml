name: Build Blob Reusable Workflow

on:
  workflow_call:
    inputs:
      subject-path:
        description: >
          Path to the artifact serving as the subject of the attestation. Must
          specify exactly one of "subject-path" or "subject-digest". May contain a
          glob pattern or list of paths (total subject count cannot exceed 2500).
          examples: https://github.com/actions/attest-build-provenance?tab=readme-ov-file#examples
        required: true
        type: string
      cert-identity:
        type: string
        description: >
          The certificate identity of the signer workflow, or builder, used in the verify job to ensure artifacts and attestations can be verified against the source repository and correct workflow using the gh-cli (e.g. --cert-identity flag). The workflow name should be rw-attest-blob.yaml.
        required: true
      autogov-version:
        description: The autogov version to use.
        required: false
        type: string
        default: v0.38.2
      octo-sts-read-scope:
        description: >
          octo-sts scope for the release job's autogov CLI download. Leave empty
          to use github.token — correct for public repos.
        required: false
        type: string
        default: ''
      octo-sts-read-identity:
        description: octo-sts read identity for the release job (used only when octo-sts-read-scope is set).
        required: false
        type: string
        default: ''
      octo-sts-release-scope:
        description: >
          octo-sts scope for the release write path (cut commit/tag and asset
          upload). Defaults to liatrio. External orgs with a protected main must
          override this with their own scope whose octo-sts app is on the branch
          ruleset bypass list.
        required: false
        type: string
        default: liatrio
      octo-sts-release-identity:
        description: octo-sts write identity for the release cut and asset upload.
        required: false
        type: string
        default: release-ops
      octo-sts-scope:
        description: >
          octo-sts scope for the private-repo autogov CLI download. Leave empty
          to use github-token — correct for public repos.
        required: false
        type: string
        default: ''
      octo-sts-identity:
        description: octo-sts identity (used only when octo-sts-scope is set).
        required: false
        type: string
        default: ''
      autogov-repo:
        description: Repository to download the autogov CLI release from.
        required: false
        type: string
        default: liatrio/autogov
      release-blob:
        description: Whether or not to run the release-blob job.
        required: false
        type: boolean
        default: true
      release-blob-asset:
        description: >
          Whether to attach the built blob(s) themselves as release assets.
          Default true (consumers ship their artifact, e.g. bundle.tar.gz). Set
          false to skip the blob asset when the subject is source already in the
          repo (e.g. attesting workflow files) — the release still ships the full
          attestation bundle + VSA.
        required: false
        type: boolean
        default: true
      allow-failed-vsa:
        description: When false (default), a FAILED policy result fails the verify job (after the FAILED VSA is attested and uploaded) and the release job is skipped. Set true to keep the advisory (non-gating) behavior.
        required: false
        type: boolean
        default: false
      vuln-threshold-critical:
        description: 'Maximum critical vulnerabilities allowed (0=none, -1=unlimited)'
        required: false
        type: string
        default: '0'
      vuln-threshold-high:
        description: 'Maximum high vulnerabilities allowed (0=none, -1=unlimited)'
        required: false
        type: string
        default: '0'
      vuln-threshold-medium:
        description: 'Maximum medium vulnerabilities allowed (0=none, -1=unlimited)'
        required: false
        type: string
        default: '0'
      vuln-threshold-low:
        description: 'Maximum low vulnerabilities allowed (0=none, -1=unlimited)'
        required: false
        type: string
        default: '0'
    outputs:
      attest-build-attestation-artifact-id:
        description: "Attestation artifact ID"
        value: ${{ jobs.attest-blob.outputs.attest-build-attestation-artifact-id }}
      attest-metadata-attestation-artifact-id:
        description: "Metadata artifact ID"
        value: ${{ jobs.attest-blob.outputs.attest-metadata-attestation-artifact-id }}
      attest-sbom-attestation-artifact-id:
        description: "SBOM artifact ID"
        value: ${{ jobs.attest-blob.outputs.attest-sbom-attestation-artifact-id }}
      attest-dependency-scan-attestation-artifact-id:
        description: "Dependency scan artifact ID"
        value: ${{ jobs.attest-blob.outputs.attest-dependency-scan-attestation-artifact-id }}
      attest-source-review-attestation-artifact-id:
        description: "Source-review (PR-approval) artifact ID"
        value: ${{ jobs.attest-blob.outputs.attest-source-review-attestation-artifact-id }}
      blob-artifact-id:
        description: "Blob artifact ID"
        value: ${{ jobs.attest-blob.outputs.blob-artifact-id }}
      vsa-artifact-id:
        description: "VSA artifact ID"
        value: ${{ jobs.verify-blob.outputs.vsa-artifact-id }}

permissions: {}

jobs:
  attest-blob:
    permissions:
      id-token: write
      attestations: write
      contents: read
      actions: read
      artifact-metadata: write
      # passed through to the nested source-review attestation job (reads PR reviews)
      pull-requests: read
    uses: ./.github/workflows/rw-attest-blob.yaml
    secrets: inherit
    with:
      subject-path: ${{ inputs.subject-path }}
      autogov-version: ${{ inputs.autogov-version }}
      octo-sts-scope: ${{ inputs.octo-sts-scope }}
      octo-sts-identity: ${{ inputs.octo-sts-identity }}
      autogov-repo: ${{ inputs.autogov-repo }}

  verify-blob:
    permissions:
      id-token: write
      attestations: write
      packages: write
      contents: read
      actions: read
      artifact-metadata: write
    needs: [attest-blob]
    uses: ./.github/workflows/rw-verify.yaml
    secrets: inherit
    with:
      build-type: blob
      blob-artifact-id: ${{ needs.attest-blob.outputs.blob-artifact-id }}
      cert-identity: ${{ inputs.cert-identity }}
      autogov-version: ${{ inputs.autogov-version }}
      octo-sts-scope: ${{ inputs.octo-sts-scope }}
      octo-sts-identity: ${{ inputs.octo-sts-identity }}
      autogov-repo: ${{ inputs.autogov-repo }}
      allow-failed-vsa: ${{ inputs.allow-failed-vsa }}
      vuln-threshold-critical: ${{ inputs.vuln-threshold-critical }}
      vuln-threshold-high: ${{ inputs.vuln-threshold-high }}
      vuln-threshold-medium: ${{ inputs.vuln-threshold-medium }}
      vuln-threshold-low: ${{ inputs.vuln-threshold-low }}

  release-blob:
    permissions:
      contents: write
      id-token: write
      actions: read
    needs: [verify-blob, attest-blob]
    if: ${{ inputs.release-blob }}
    uses: ./.github/workflows/rw-release.yaml
    secrets: inherit
    with:
      autogov-version: ${{ inputs.autogov-version }}
      vsa-artifact-id: ${{ needs.verify-blob.outputs.vsa-artifact-id }}
      # skip the blob asset when release-blob-asset is false (empty id -> rw-release
      # does not download/attach the blob) — the bundle + VSA still ship.
      blob-artifact-id: ${{ inputs.release-blob-asset && needs.attest-blob.outputs.blob-artifact-id || '' }}
      octo-sts-read-scope: ${{ inputs.octo-sts-read-scope }}
      octo-sts-read-identity: ${{ inputs.octo-sts-read-identity }}
      octo-sts-release-scope: ${{ inputs.octo-sts-release-scope }}
      octo-sts-release-identity: ${{ inputs.octo-sts-release-identity }}
