name: Build Blob Reusable Workflow

on:
  workflow_call:
    inputs:
      subject-path:
        description: >
          Path to the artifact serving as the subject of the attestation. Must
          specify exactly one of "subject-path" or "subject-digest". May contain a
          glob pattern or list of paths (total subject count cannot exceed 2500).
          examples: https://github.com/actions/attest-build-provenance?tab=readme-ov-file#examples
        required: true
        type: string
      cert-identity:
        type: string
        description: >
          The certificate identity of the signer workflow, or builder, used in the verify job to ensure artifacts and attestations can be verified against the source repository and correct workflow using the gh-cli (e.g. --cert-identity flag). The workflow name should be rw-attest-blob.yaml.
        required: true
      autogov-version:
        description: The autogov version to use.
        required: false
        type: string
        default: v0.20.0
      release-blob:
        description: Whether or not to run the release-blob job.
        required: false
        type: boolean
        default: true
      vuln-threshold-critical:
        description: 'Maximum critical vulnerabilities allowed (0=none, -1=unlimited)'
        required: false
        type: string
        default: '0'
      vuln-threshold-high:
        description: 'Maximum high vulnerabilities allowed (0=none, -1=unlimited)'
        required: false
        type: string
        default: '0'
      vuln-threshold-medium:
        description: 'Maximum medium vulnerabilities allowed (0=none, -1=unlimited)'
        required: false
        type: string
        default: '0'
      vuln-threshold-low:
        description: 'Maximum low vulnerabilities allowed (0=none, -1=unlimited)'
        required: false
        type: string
        default: '0'
    outputs:
      attest-build-attestation-artifact-id:
        description: "Attestation artifact ID"
        value: ${{ jobs.attest-blob.outputs.attest-build-attestation-artifact-id }}
      attest-metadata-attestation-artifact-id:
        description: "Metadata artifact ID"
        value: ${{ jobs.attest-blob.outputs.attest-metadata-attestation-artifact-id }}
      attest-sbom-attestation-artifact-id:
        description: "SBOM artifact ID"
        value: ${{ jobs.attest-blob.outputs.attest-sbom-attestation-artifact-id }}
      attest-dependency-scan-attestation-artifact-id:
        description: "Dependency scan artifact ID"
        value: ${{ jobs.attest-blob.outputs.attest-dependency-scan-attestation-artifact-id }}
      blob-artifact-id:
        description: "Blob artifact ID"
        value: ${{ jobs.attest-blob.outputs.blob-artifact-id }}
      vsa-artifact-id:
        description: "VSA artifact ID"
        value: ${{ jobs.verify-blob.outputs.vsa-artifact-id }}

permissions: {}

jobs:
  attest-blob:
    permissions:
      id-token: write
      attestations: write
      contents: read
      actions: read
      artifact-metadata: write
    uses: ./.github/workflows/rw-attest-blob.yaml
    secrets: inherit
    with:
      subject-path: ${{ inputs.subject-path }}
      autogov-version: ${{ inputs.autogov-version }}

  verify-blob:
    permissions:
      id-token: write
      attestations: write
      packages: write
      contents: read
      actions: read
      artifact-metadata: write
    needs: [attest-blob]
    uses: ./.github/workflows/rw-verify.yaml
    secrets: inherit
    with:
      build-type: blob
      blob-artifact-id: ${{ needs.attest-blob.outputs.blob-artifact-id }}
      cert-identity: ${{ inputs.cert-identity }}
      autogov-version: ${{ inputs.autogov-version }}
      vuln-threshold-critical: ${{ inputs.vuln-threshold-critical }}
      vuln-threshold-high: ${{ inputs.vuln-threshold-high }}
      vuln-threshold-medium: ${{ inputs.vuln-threshold-medium }}
      vuln-threshold-low: ${{ inputs.vuln-threshold-low }}

  release-blob:
    permissions:
      contents: write
      id-token: write
      actions: read
    needs: [verify-blob, attest-blob]
    if: ${{ inputs.release-blob }}
    uses: ./.github/workflows/rw-release.yaml
    secrets: inherit
    with:
      build-type: blob
      attest-build-attestation-artifact-id: ${{ needs.attest-blob.outputs.attest-build-attestation-artifact-id }}
      attest-metadata-attestation-artifact-id: ${{ needs.attest-blob.outputs.attest-metadata-attestation-artifact-id }}
      attest-sbom-attestation-artifact-id: ${{ needs.attest-blob.outputs.attest-sbom-attestation-artifact-id }}
      attest-dependency-scan-attestation-artifact-id: ${{ needs.attest-blob.outputs.attest-dependency-scan-attestation-artifact-id }}
      blob-artifact-id: ${{ needs.attest-blob.outputs.blob-artifact-id }}
      vsa-artifact-id: ${{ needs.verify-blob.outputs.vsa-artifact-id }}
      publish-vsa: true
