name: Release Low Permissions Reusable Workflow

on:
  workflow_call:
    inputs:
      blob-artifact-id:
        type: string
        description: The artifact-id of the build artifacts.
        required: true
        default: ${{ github.event.needs.build-low-perms.outputs.blob-artifact-id }}
      attest-build-attestation-artifact-id:
        description: The artifact-id of the build provenance attestation artifact.
        default: ${{ github.event.needs.attest-build-low-perms.outputs.attest-build-attestation-artifact-id }}
        type: string
      attest-metadata-attestation-artifact-id:
        description: The artifact-id of the custom metadata attestation artifact.
        default: ${{ github.event.needs.attest-metadata-low-perms.outputs.metadata-artifact-id }}
        type: string
      attest-sbom-attestation-artifact-id:
        description: The artifact-id of the SBOM attestation artifact.
        default: ${{ github.event.needs.attest-sbom-low-perms.outputs.sbom-artifact-id }}
        type: string
      attest-dependency-scan-attestation-artifact-id:
        description: The artifact-id of the dependency scan attestation artifact.
        default: ${{ github.event.needs.attest-dependency-scan-low-perms.outputs.dependency-scan-artifact-id }}
        type: string
      vsa-artifact-id:
        type: string
        description: The artifact-id of the VSA artifact.
        required: false
        default: ${{ github.event.needs.verify.outputs.vsa-artifact-id }}
      workflow-runner-label:
        type: string
        description: The label of the workflow runner
        default: ubuntu-latest
      github-token:
        description: >
          The GitHub token set throughout the reusable workflow including the composite (build) action.
        required: false
        type: string
      publish-vsa:
        description: Whether to publish VSA as release assets.
        required: false
        type: boolean
        default: true
    outputs:
      semantic-release-version:
        description: The version of the semantic release generated by the semantic-release action.
        value: ${{ jobs.release-low-perms.outputs.semantic-release-version }}

env:
  ARTIFACT_IDS: '${{ inputs.attest-build-attestation-artifact-id }},${{ inputs.attest-metadata-attestation-artifact-id }},${{ inputs.attest-sbom-attestation-artifact-id }},${{ inputs.attest-dependency-scan-attestation-artifact-id }}'
  BLOB_ARTIFACT_ID: ${{ inputs.blob-artifact-id || '' }}
  VSA_ARTIFACT_ID: ${{ inputs.vsa-artifact-id || '' }}
  ATTESTATIONS_FOLDER: ./attestations
  ARTIFACTS_FOLDER: ./artifacts
  VSA_FOLDER: ./vsa

permissions: {}

jobs:
  release-low-perms:
    runs-on: ${{ inputs.workflow-runner-label }}
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    permissions:
      contents: write
      id-token: write
      actions: read
    outputs:
      semantic-release-version: ${{ steps.semantic-release.outputs.new_release_version }}
    steps:
      - name: Fail if Runner is self-hosted
        if: ${{ runner.environment != 'github-hosted' }}
        run: |
          echo "Job is running on a self-hosted runner. Terminating job..."
          exit 1
      - name: Checkout code
        if: ${{ runner.environment == 'github-hosted'}}
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
      - name: Create Attestations, Artifacts, and VSA Folders
        run: mkdir ${{ env.ATTESTATIONS_FOLDER }} && mkdir ${{ env.ARTIFACTS_FOLDER }} && mkdir ${{ env.VSA_FOLDER }}
      - name: Download Sigstore Bundle(s)
        if: ${{ inputs.publish-vsa == false }}
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          github-token: ${{ inputs.github-token || github.token }}
          artifact-ids: ${{ env.ARTIFACT_IDS }}
          path: ${{ env.ATTESTATIONS_FOLDER }}
          merge-multiple: true
      - name: Download Artifact(s)
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          github-token: ${{ inputs.github-token || github.token }}
          artifact-ids: ${{ env.BLOB_ARTIFACT_ID }}
          path: ${{ env.ARTIFACTS_FOLDER }}
          merge-multiple: true
      - name: Download VSA
        if: ${{ env.VSA_ARTIFACT_ID != '' }}
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          github-token: ${{ inputs.github-token || github.token }}
          artifact-ids: ${{ env.VSA_ARTIFACT_ID }}
          path: ${{ env.VSA_FOLDER }}
          merge-multiple: true
      - uses: octo-sts/action@d6c70ad3b9ac85df6da6b9749014d7283987cfec # v1.0.3
        id: octo-sts
        with:
          scope: ${{ github.repository }}
          identity: release-ops
      - name: Run semantic-release
        uses: cycjimmy/semantic-release-action@ba330626c4750c19d8299de843f05c7aa5574f62 # v5.0.2
        id: semantic-release
        with:
          extra_plugins: |
            @semantic-release/commit-analyzer
            @semantic-release/release-notes-generator
            @semantic-release/exec
            @semantic-release-extras/verified-git-commit
            @semantic-release/github
            conventional-changelog-conventionalcommits
        env:
          GITHUB_TOKEN: ${{ steps.octo-sts.outputs.token }}
          VSA_FOLDER: ${{ env.VSA_FOLDER }}
          ATTESTATIONS_FOLDER: ${{ env.ATTESTATIONS_FOLDER }}
          ARTIFACTS_FOLDER: ${{ env.ARTIFACTS_FOLDER }}
      - name: Upload Signed VSA and Assets as Release Asset
        if: steps.semantic-release.outputs.new_release_published == 'true'
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2.2.1
        with:
          files: |
            ${{ env.VSA_ARTIFACT_ID != '' && inputs.publish-vsa && format('{0}/*', env.VSA_FOLDER) || '' }}
            ${{ inputs.publish-vsa == false && format('{0}/*', env.ATTESTATIONS_FOLDER) || '' }}
            ${{ env.ARTIFACTS_FOLDER }}/*
          tag_name: v${{ steps.semantic-release.outputs.new_release_version }}
          token: ${{ inputs.github-token || github.token }}
