name: Verify Low Permissions Reusable Workflow

on:
  workflow_call:
    inputs:
      blob-artifact-id:
        type: string
        description: The artifact-id of the build artifacts.
        required: true
        default: ${{ github.event.needs.build-low-perms.outputs.blob-artifact-id }}
      attest-build-attestation-artifact-id:
        description: The artifact-id of the build provenance attestation artifact.
        default: ${{ github.event.needs.attest-build-low-perms.outputs.attest-build-attestation-artifact-id }}
        type: string
      attest-metadata-attestation-artifact-id:
        description: The artifact-id of the custom metadata attestation artifact.
        default: ${{ github.event.needs.attest-metadata-low-perms.outputs.build-artifact-id }}
        type: string
      attest-sbom-attestation-artifact-id:
        description: The artifact-id of the SBOM attestation artifact.
        default: ${{ github.event.needs.attest-sbom-low-perms.outputs.build-artifact-id }}
        type: string
      attest-dependency-scan-attestation-artifact-id:
        description: The artifact-id of the dependency scan attestation artifact.
        default: ${{ github.event.needs.attest-dependency-scan-low-perms.outputs.build-artifact-id }}
        type: string
      cert-identity:
        type: string
        description: >
          The certificate identity of the signer workflow, or builder, used in the verify job to ensure artifacts and attestations can be verified against the source repository and correct workflow using the gh-cli (e.g. --cert-identity flag). Since blob is the only build type that uses this workflow, the workflow name should be rw-lp-attest-blob.yaml
        required: true
      github-token:
        description: >
          The GitHub token set throughout the reusable workflow including the composite (build) action.
        default: ''
        required: false
        type: string
      workflow-runner-label:
        type: string
        description: The label of the workflow runner
        required: false
        default: ubuntu-latest
      autogov-verify-version:
        description: The autogov-verify version to use.
        required: false
        type: string
        default: v0.6.1
      opa-version:
        description: The OPA version to use.
        required: false
        type: string
        default: v1.1.0

    outputs:
      vsa-artifact-id:
        description: The artifact-id of the VSA attestation artifact.
        value: ${{ jobs.verify-low-perms.outputs.vsa-artifact-id }}

permissions: {}

env:
  GH_TOKEN: ${{ inputs.github-token || github.token }}
  ARTIFACT_IDS: '${{ inputs.attest-build-attestation-artifact-id }},${{ inputs.attest-metadata-attestation-artifact-id }},${{ inputs.attest-sbom-attestation-artifact-id }},${{ inputs.attest-dependency-scan-attestation-artifact-id }}'
  ATTESTATIONS_FOLDER: ./attestations
  ARTIFACTS_FOLDER: ./artifacts
  VSA_FOLDER: ./vsa
  POLICY_REPO_NAME: liatrio-rego-policy-library

jobs:
  verify-low-perms:
    outputs:
      vsa-artifact-id: ${{ steps.upload-vsa-artifact.outputs.artifact-id }}
    permissions:
      contents: read
      actions: read
      id-token: write
      attestations: write
    runs-on: ${{ inputs.workflow-runner-label }}
    steps:
      - name: Fail if Runner is self-hosted
        if: ${{ runner.environment != 'github-hosted' }}
        run: |
          echo "Job is running on a self-hosted runner. Terminating job..."
          exit 1
      - name: Create Attestations, Artifacts, and VSA Folders
        if: ${{ runner.environment == 'github-hosted' }}
        run: mkdir ${{ env.ATTESTATIONS_FOLDER }} && mkdir ${{ env.ARTIFACTS_FOLDER }} && mkdir ${{ env.VSA_FOLDER }}
      - name: Download Sigstore Bundle(s)
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          github-token: ${{ inputs.github-token || github.token }}
          artifact-ids: ${{ env.ARTIFACT_IDS }}
          path: ${{ env.ATTESTATIONS_FOLDER }}
          merge-multiple: true
      - uses: octo-sts/action@6177b4481c00308b3839969c3eca88c96a91775f # v1.0.0
        id: octo-sts
        with:
          scope: liatrio
          identity: autogov-infra
      - name: Install autogov-verify
        env:
          GH_TOKEN: ${{ steps.octo-sts.outputs.token }}
        run: |
          gh release download ${{ inputs.autogov-verify-version }} \
            --repo liatrio/autogov-verify \
            --pattern "autogov-verify"
            chmod +x autogov-verify
      - name: Download Policy Schemas
        env:
          GH_TOKEN: ${{ steps.octo-sts.outputs.token }}
        run: |
          gh release download \
            --repo ${{ github.repository_owner }}/${{ env.POLICY_REPO_NAME }} \
            --pattern "schemas.tar.gz" \
            --pattern "bundle.tar.gz"
      - name: Download Blob Artifact(s)
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          github-token: ${{ inputs.github-token || github.token }}
          artifact-ids: ${{ inputs.blob-artifact-id }}
          path: ${{ env.ARTIFACTS_FOLDER }}
          merge-multiple: true
      - name: Offline Verification and VSA Generation for Blob Attestation(s)
        id: verify-blob
        env:
          GH_TOKEN: ${{ steps.octo-sts.outputs.token }}
        run: |
          set +x
          VSA_FILE="${{ env.VSA_FOLDER }}/verification-summary-attestations.json"

          ARTIFACT_COUNT=$(find ${{ env.ARTIFACTS_FOLDER }} -type f | wc -l)
          echo "Found $ARTIFACT_COUNT artifact(s) to verify in ${{ env.ARTIFACTS_FOLDER }}"

          if [ "$ARTIFACT_COUNT" -gt 0 ]; then
            echo "Artifacts to verify:"
            find ${{ env.ARTIFACTS_FOLDER }} -type f -exec basename {} \;

            ./autogov-verify offline \
              --blob-path "${{ env.ARTIFACTS_FOLDER }}" \
              --attestations "${{ env.ATTESTATIONS_FOLDER }}" \
              --cert-identity "${{ inputs.cert-identity }}" \
              --source-ref "${{ github.ref }}" \
              --policy-bundle-path "bundle.tar.gz" \
              --policy-schemas-path "schemas.tar.gz" \
              --policy-uri "https://github.com/${{ github.repository_owner }}/${{ env.POLICY_REPO_NAME }}" \
              --generate-vsa \
              --vsa-output "$VSA_FILE"

            if [ -f "$VSA_FILE" ] && jq empty "$VSA_FILE" 2>/dev/null; then
              RESULT_RAW=$(jq -r '.predicate.verificationResult // "UNKNOWN"' "$VSA_FILE")
              case "$RESULT_RAW" in
                "true"|"PASSED") 
                  echo "✓ Verification PASSED"
                  OVERALL_STATUS="PASSED"
                  ;;
                "false"|"FAILED") 
                  echo "✗ Verification FAILED"
                  OVERALL_STATUS="FAILED"
                  ;;
                *) 
                  echo "Error: Unknown verification result: $RESULT_RAW"
                  echo "Unable to process VSA with unknown verification status"
                  exit 1
                  ;;
              esac

              mv "$VSA_FILE" "${{ env.VSA_FOLDER }}/verification-summary-attestations-${OVERALL_STATUS}.json"
              echo "result-status=$OVERALL_STATUS" >> $GITHUB_OUTPUT
              echo "Overall verification status: $OVERALL_STATUS"
            else
              echo "Error: Failed to generate valid VSA"
              exit 1
            fi
          else
            echo "Error: No artifacts found to verify"
            exit 1
          fi
      - name: Display VSA Summary
        if: success() || failure()
        run: |
          VSA_FILE=$(find ${{ env.VSA_FOLDER }} -name "verification-summary-attestation*.json*" | head -1)
          if [ -f "$VSA_FILE" ]; then
            echo "### Verification Summary Attestation (VSA) Results" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            echo "#### Result: ${{ steps.verify-blob.outputs.result-status }}" >> $GITHUB_STEP_SUMMARY
            echo "#### Verifier: $(jq -r '.predicate.verifier.id // "N/A"' "$VSA_FILE")" >> $GITHUB_STEP_SUMMARY
            echo "#### Time Verified: $(jq -r '.predicate.timeVerified // "N/A"' "$VSA_FILE")" >> $GITHUB_STEP_SUMMARY
            echo "#### Policy URI: $(jq -r '.predicate.policy.uri // "N/A"' "$VSA_FILE")" >> $GITHUB_STEP_SUMMARY
            echo "#### SLSA Levels: $(jq -r '.predicate.verifiedLevels | join(", ") // "N/A"' "$VSA_FILE")" >> $GITHUB_STEP_SUMMARY

            SUBJECT_COUNT=$(jq '.subject | length' "$VSA_FILE")
            if [ "$SUBJECT_COUNT" -gt 1 ]; then
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "#### Verified Subjects:" >> $GITHUB_STEP_SUMMARY
              jq -r '.subject[] | "- \(.uri // .name // "unknown")"' "$VSA_FILE" >> $GITHUB_STEP_SUMMARY
            fi

            echo "" >> $GITHUB_STEP_SUMMARY
            echo "#### VSA File: $(basename "$VSA_FILE")" >> $GITHUB_STEP_SUMMARY
          else
            echo "No VSA file found" >> $GITHUB_STEP_SUMMARY
          fi
      - name: Upload VSA Artifact
        id: upload-vsa-artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: verification-summary-attestation-low-perms
          path: ${{ env.VSA_FOLDER }}/verification-summary-attestations-${{ steps.verify-blob.outputs.result-status }}.json
          if-no-files-found: error
