name: Build Blob Low Permissions Reuseable Workflow

on:
  workflow_call:
    inputs:
      subject-path:
        description: >
          Path to the artifact serving as the subject of the attestation. Must
          specify exactly one of "subject-path" or "subject-digest". May contain a
          glob pattern or list of paths (total subject count cannot exceed 2500).
          examples: https://github.com/actions/attest-build-provenance?tab=readme-ov-file#examples
        required: true
        type: string
      cert-identity:
        type: string
        description: >
          The certificate identity of the signer workflow, or builder, used in the verify job to ensure artifacts and attestations can be verified against the source repository and correct workflow using the gh-cli (e.g. --cert-identity flag). Since blob is the only build type that uses this workflow, the workflow name should be rw-lp-attest-blob.yaml
        required: true

permissions: {}

jobs:
  attest-blob: #blob
    permissions:
      id-token: write
      attestations: write
      contents: read
    uses: ./.github/workflows/rw-lp-attest-blob.yaml
    secrets: inherit
    with:
      subject-path: |
        i_am_blob
        i_am_another_blob

  verify-blob: #blob
    permissions:
      contents: read
    needs: [attest-blob]
    uses: ./.github/workflows/rw-lp-verify.yaml
    secrets: inherit
    with:
      blob-artifact-id: ${{ needs.attest-blob.outputs.blob-artifact-id }}
      attest-build-attestation-artifact-id: ${{ needs.attest-blob.outputs.attest-build-attestation-artifact-id }}
      attest-metadata-attestations-artifact-id: ${{ needs.attest-blob.outputs.attest-metadata-attestations-artifact-id }}
      attest-sbom-attestations-artifact-id: ${{ needs.attest-blob.outputs.attest-sbom-attestations-artifact-id }}
      cert-identity: ${{ inputs.cert-identity }}

  run-opa-blob: #blob
    permissions:
      contents: read
    needs: [verify-blob, attest-blob]
    uses: ./.github/workflows/rw-lp-run-opa.yaml
    secrets: inherit
    with:
      attest-build-attestation-artifact-id: ${{ needs.attest-blob.outputs.attest-build-attestation-artifact-id }}
      attest-metadata-attestations-artifact-id: ${{ needs.attest-blob.outputs.attest-metadata-attestations-artifact-id }}
      attest-sbom-attestations-artifact-id: ${{ needs.attest-blob.outputs.attest-sbom-attestations-artifact-id }}

  release-blob: #blob
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    needs: [verify-blob, attest-blob, run-opa-blob]
    uses: ./.github/workflows/rw-lp-release.yaml
    secrets: inherit
    with:
      attest-build-attestation-artifact-id: ${{ needs.attest-blob.outputs.attest-build-attestation-artifact-id }}
      attest-metadata-attestations-artifact-id: ${{ needs.attest-blob.outputs.attest-metadata-attestations-artifact-id }}
      attest-sbom-attestations-artifact-id: ${{ needs.attest-blob.outputs.attest-sbom-attestations-artifact-id }}
      blob-artifact-id: ${{ needs.attest-blob.outputs.blob-artifact-id }}
      results-artifact-id: ${{ needs.run-opa-blob.outputs.results-artifact-id }}
