name: Attest Image Build

on:
  workflow_call:
    outputs:
      image_digest:
        description: "The digest of the image that was built and pushed"
        value: ${{ jobs.attest-build.outputs.digest }}

jobs:
  attest-build:
    outputs:
      digest: ${{ steps.digest.outputs.sha256 }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master' }}
      - name: Build and push Docker image
        id: build-image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=oci,dest=/tmp/image.tar
      - id: digest
        run: echo "sha256=${{ steps.build-image.outputs.digest }}" >> "$GITHUB_OUTPUT"
      - name: Attest Provenance
        uses: actions/attest-build-provenance@v1
        id: attest-build-provenance
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.build-image.outputs.digest }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          push-to-registry: true
