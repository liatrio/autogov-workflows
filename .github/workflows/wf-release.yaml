name: Release Workflow

on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - 'catalog-info.yaml'
      - 'renovate.json'

env:
  GH_TOKEN: ${{ secrets.RW_CW_POLICY_REPO_ACCESS }}
  ATTESTATIONS_FOLDER: ./attestations

jobs:
  release:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    permissions:
      contents: write
    steps:
      - name: Check runner type
        if: ${{ runner.environment != 'github-hosted' }}
        run: |
          echo "Job is running on a self-hosted runner. Terminating job..."
          exit 1
      - name: Run go-semantic-release
        if: ${{ runner.environment == 'github-hosted' }}
        uses: go-semantic-release/action@48d83acd958dae62e73701aad20a5b5844a3bf45 # v1.23.0
        id: go-semantic-release
        with:
          github-token: ${{ env.GH_TOKEN }}
          changelog-generator-opt: emojis=true
          allow-initial-development-versions: true
      - name: Get Run ID for Results
        id: get-run-id
        run: |
          WF_NAME="Build Image Caller Workflow"
          RUN_ID=$(gh run --repo "${{ github.repository }}" list --workflow "${WF_NAME}" --json databaseId --jq .[0].databaseId)
          echo "Detected latest run id of ${RUN_ID} for workflow ${WF_NAME}"
          echo "run-id=${RUN_ID}" >> "$GITHUB_OUTPUT"
      - name: Wait for workflow to complete
        run: |
          workflow_run_id=${{ steps.get-run-id.outputs.run-id }}
          while true; do
            status=$(gh run --repo "${{ github.repository }}" view $workflow_run_id --json status -q .status)
            conclusion=$(gh run --repo "${{ github.repository }}" view $workflow_run_id --json conclusion -q .conclusion)
            if [[ "$status" == "completed" ]]; then
              if [[ "$conclusion" == "success" ]]; then
                echo "Workflow completed successfully."
                break
              else
                echo "Workflow did not complete successfully."
                exit 1
              fi
            fi
            echo "Waiting for workflow to complete..."
            sleep 15
          done
      - name: Download All Sigstore Attestations
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: all-attestations
          path: ${{ env.ATTESTATIONS_FOLDER }}
          github-token: ${{ env.GH_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ steps.get-run-id.outputs.run-id }}
      - name: Download Results
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: image-results
          path: image-results
          github-token: ${{ env.GH_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ steps.get-run-id.outputs.run-id }}
      - name: Upload Results/Sigstore Bundle for Image as Release Asset
        if: steps.go-semantic-release.outputs.version != ''
        uses: softprops/action-gh-release@c062e08bd532815e2082a85e87e3ef29c3e6d191 # v2.0.8
        with:
          files: |
            image-results/*
            ${{ env.ATTESTATIONS_FOLDER }}/*.jsonl
          tag_name: v${{ steps.go-semantic-release.outputs.version }}
          token: ${{ env.GH_TOKEN }}
