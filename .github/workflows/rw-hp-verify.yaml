name: Verify High Permissions Reuseable Workflow

on:
  workflow_call:
    inputs:
      build-type:
        description: 'Specify the type of build: "image" or "blob".'
        required: true
        type: string
      subject-name:
        description: >
          Subject name as it should appear in the attestation. Required unless
          "subject-path" is specified, in which case it will be inferred from the
          path.
        default: ${{ github.repository }}
        required: false
        type: string
      image-digest:
        description: The digest of the image that was built and pushed
        default: ${{ inputs.build-type == 'image' && github.event.needs.build.outputs.image-digest }}
        required: false
        type: string
      registry:
        description: >
          The container registry to use.
        default: ghcr.io
        required: false
        type: string
      blob-artifact-id:
        description: The artifact-id of the build artifacts.
        default: ${{ inputs.build-type == 'blob' && github.event.needs.build.outputs.blob-artifact-id }}
        type: string
      cert-identity:
        description: >
          The certificate identity of the signer workflow, or builder, used in the verify job to ensure artifacts and attestations can be verified against the source repository and correct workflow using the gh-cli (e.g. --cert-identity flag). If verifying an image, the workflow name should be rw-<permissions_path>-attest-image.yaml, if verifying blob(s), the workflow name should be rw-<permissions_path>-attest-blob.yaml.
        required: true
        type: string
      github-token:
        description: >
          The GitHub token set throughout the reuseable workflow including the composite (build) action.
        default: ''
        required: false
        type: string
      workflow-runner-label:
        description: The label of the workflow runner
        default: ubuntu-latest
        required: false
        type: string
      autogov-verify-version:
        description: The autogov-verify version to use.
        required: false
        type: string
        default: v0.6.1
      use-cert-identity-list:
        description: Whether to use cert-identity-list for validation
        required: false
        type: boolean
        default: ${{ github.repository != 'liatrio/liatrio-gh-autogov-workflows' }}
      opa-version:
        description: The OPA version to use.
        required: false
        type: string
        default: v1.1.0

permissions: {}

env:
  GH_TOKEN: ${{ inputs.github-token || github.token }}
  ATTESTATIONS_FOLDER: ./attestations
  ARTIFACTS_FOLDER: ./artifacts
  VSA_FOLDER: ./vsa
  POLICY_REPO_NAME: liatrio-rego-policy-library

jobs:
  verify-high-perms:
    outputs:
      vsa-artifact-id: ${{ steps.upload-vsa-artifact.outputs.artifact-id }}
    permissions:
      contents: read
      packages: write
      actions: read
      id-token: write
      attestations: write
    runs-on: ${{ inputs.workflow-runner-label }}
    steps:
      - name: Fail if Runner is self-hosted
        if: ${{ runner.environment != 'github-hosted' }}
        run: |
          echo "Job is running on a self-hosted runner. Terminating job..."
          exit 1
      - name: Validate Inputs
        if: ${{ runner.environment == 'github-hosted' }}
        run: |
          if [[ "${{ inputs.build-type }}" == "image" && -z "${{ inputs.image-digest }}" ]]; then
            echo "Error: image-digest is required for build-type 'image'."
            exit 1
          elif [[ "${{ inputs.build-type }}" == "blob" && -z "${{ inputs.blob-artifact-id}}" ]]; then
            echo "Error: blob-artifact-id is required for build-type 'blob'."
            exit 1
          fi
      - name: Login to GitHub Container Registry
        uses: docker/login-action@184bdaa0721073962dff0199f1fb9940f07167d1 # v3.5.0
        with:
          registry: ${{ inputs.registry }}
          username: ${{ github.actor }}
          password: ${{ inputs.github-token || github.token }}
      - name: Create Attestations, Artifacts, and VSA Folders
        run: mkdir ${{ env.ATTESTATIONS_FOLDER }} && mkdir ${{ env.ARTIFACTS_FOLDER }} && mkdir ${{ env.VSA_FOLDER }}
      - name: Download Blob Artifact(s)
        if: ${{ inputs.build-type == 'blob' }}
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          github-token: ${{ inputs.github-token || github.token }}
          artifact-ids: ${{ inputs.blob-artifact-id }}
          path: ${{ env.ARTIFACTS_FOLDER }}
          merge-multiple: true
      - name: Download Blob Artifact Attestation(s)
        if: ${{ inputs.build-type == 'blob' }}
        run: |
          cd ${{ env.ATTESTATIONS_FOLDER }}
          find ../${{ env.ARTIFACTS_FOLDER }} -type f -exec gh attestation download {} --repo ${{ github.repository }} \;
      - uses: octo-sts/action@6177b4481c00308b3839969c3eca88c96a91775f # v1.0.0
        id: octo-sts
        with:
          scope: liatrio
          identity: autogov-infra
      - name: Setup OPA
        uses: open-policy-agent/setup-opa@34a30e8a924d1b03ce2cf7abe97250bbb1f332b5 # v2.2.0
        with:
          version: ${{ inputs.opa-version }}
      - name: Setup ORAS
        uses: oras-project/setup-oras@8d34698a59f5ffe24821f0b48ab62a3de8b64b20 # v1.2.3
      - name: Install autogov-verify
        env:
          GH_TOKEN: ${{ steps.octo-sts.outputs.token }}
        run: |
          # TODO: Revert to release download after testing
          # gh release download ${{ inputs.autogov-verify-version }} \
          #   --repo liatrio/autogov-verify \
          #   --pattern "autogov-verify"

          # Build from branch for testing
          gh repo clone liatrio/autogov-verify autogov-verify-src -- --depth 1 --branch fix/fixes-flags
          cd autogov-verify-src
          go build -o ../autogov-verify .
          cd ..
          rm -rf autogov-verify-src
          chmod +x autogov-verify
      - name: Download cert-identities file
        if: ${{ inputs.use-cert-identity-list }}
        env:
          GH_TOKEN: ${{ steps.octo-sts.outputs.token }}
        run: |
          gh release download \
            --repo liatrio/liatrio-gh-autogov-workflows \
            --pattern "cert-identities.json"
      - name: Download Policy Bundle
        env:
          GH_TOKEN: ${{ steps.octo-sts.outputs.token }}
        run: |
          set +x
          oras pull \
            ghcr.io/${{ github.repository_owner }}/${{ env.POLICY_REPO_NAME }}:latest
      - name: Download Policy Schemas
        env:
          GH_TOKEN: ${{ steps.octo-sts.outputs.token }}
        run: |
          gh release download \
            --repo ${{ github.repository_owner }}/${{ env.POLICY_REPO_NAME }} \
            --pattern "schemas.tar.gz"
      - name: Verification and VSA Generation for Image Attestation(s)
        env:
          GH_TOKEN: ${{ inputs.github-token || github.token }}
        id: verify-image
        if: ${{ inputs.build-type == 'image' }}
        run: |
          set +x
          VSA_FILE="${{ env.VSA_FOLDER }}/verification-summary-attestation.json"
          ./autogov-verify \
            --artifact-digest "${{ format('{0}/{1}@{2}', inputs.registry, inputs.subject-name, inputs.image-digest) }}" \
            --cert-identity "${{ inputs.cert-identity }}" \
            --source-ref "${{ github.ref }}" \
            --policy-bundle-path "bundle.tar.gz" \
            --policy-uri "https://github.com/${{ github.repository_owner }}/${{ env.POLICY_REPO_NAME }}" \
            --generate-vsa \
            --vsa-output "$VSA_FILE" \
            ${{ inputs.use-cert-identity-list && '--cert-identity-list cert-identities.json' || '' }}

          RESULT_RAW=$(jq -r '.predicate.verificationResult // "UNKNOWN"' "$VSA_FILE")
          case "$RESULT_RAW" in
            "true") RESULT_STATUS="PASSED" ;;
            "false") RESULT_STATUS="FAILED" ;;
            "PASSED"|"FAILED") RESULT_STATUS="$RESULT_RAW" ;;
            *) RESULT_STATUS="UNKNOWN" ;;
          esac

          if [ "$RESULT_STATUS" = "PASSED" ] || [ "$RESULT_STATUS" = "FAILED" ]; then
            mv "$VSA_FILE" "${{ env.VSA_FOLDER }}/verification-summary-attestation-${RESULT_STATUS}.json"
            echo "result-status=$RESULT_STATUS" >> $GITHUB_OUTPUT
          else
            echo "Warning: Unknown VSA result status: $RESULT_RAW (normalized to $RESULT_STATUS)"
            echo "result-status=UNKNOWN" >> $GITHUB_OUTPUT
          fi
      - name: Verification and VSA Generation for Blob Attestation(s)
        id: verify-blob
        if: ${{ inputs.build-type == 'blob' }}
        run: |
          set +x
          VSA_FILE="${{ env.VSA_FOLDER }}/verification-summary-attestations.json"

          ARTIFACT_COUNT=$(find ${{ env.ARTIFACTS_FOLDER }} -type f | wc -l)
          echo "Found $ARTIFACT_COUNT artifact(s) to verify in ${{ env.ARTIFACTS_FOLDER }}"

          if [ "$ARTIFACT_COUNT" -gt 0 ]; then
            echo "Artifacts to verify:"
            find ${{ env.ARTIFACTS_FOLDER }} -type f -exec basename {} \;

            ./autogov-verify \
              --blob-path "${{ env.ARTIFACTS_FOLDER }}" \
              --repo ${{ github.repository }} \
              --cert-identity "${{ inputs.cert-identity }}" \
              --source-ref "${{ github.ref }}" \
              --policy-bundle-path "bundle.tar.gz" \
              --policy-schemas-path "schemas.tar.gz" \
              --policy-uri "https://github.com/${{ github.repository_owner }}/${{ env.POLICY_REPO_NAME }}" \
              --generate-vsa \
              --vsa-output "$VSA_FILE" \
              ${{ inputs.use-cert-identity-list && '--cert-identity-list cert-identities.json' || '' }}

            if [ -f "$VSA_FILE" ] && jq empty "$VSA_FILE" 2>/dev/null; then
              RESULT_RAW=$(jq -r '.predicate.verificationResult // "UNKNOWN"' "$VSA_FILE")
              case "$RESULT_RAW" in
                "true"|"PASSED") 
                  echo "✓ Verification PASSED"
                  OVERALL_STATUS="PASSED"
                  ;;
                "false"|"FAILED") 
                  echo "✗ Verification FAILED"
                  OVERALL_STATUS="FAILED"
                  ;;
                *) 
                  echo "? Unknown result: $RESULT_RAW"
                  OVERALL_STATUS="UNKNOWN"
                  ;;
              esac

              mv "$VSA_FILE" "${{ env.VSA_FOLDER }}/verification-summary-attestations-${OVERALL_STATUS}.json"
              echo "result-status=$OVERALL_STATUS" >> $GITHUB_OUTPUT
              echo "Overall verification status: $OVERALL_STATUS"
            else
              echo "Error: Failed to generate valid VSA"
              exit 1
            fi
          else
            echo "Error: No artifacts found to verify"
            exit 1
          fi
      - name: Display VSA Summary
        if: success() || failure()
        run: |
          VSA_FILE=$(find ${{ env.VSA_FOLDER }} -name "verification-summary-attestation*.json*" | head -1)
          if [ -f "$VSA_FILE" ]; then
            echo "### Verification Summary Attestation (VSA) Results" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            RESULT_BOOL=$(jq -r '.predicate.verificationResult' "$VSA_FILE")
            if [ "$RESULT_BOOL" = "true" ]; then
              RESULT_STATUS="PASSED"
            elif [ "$RESULT_BOOL" = "false" ]; then
              RESULT_STATUS="FAILED"
            else
              RESULT_STATUS="UNKNOWN"
            fi

            echo "#### Result: $RESULT_STATUS" >> $GITHUB_STEP_SUMMARY
            echo "#### Verifier: $(jq -r '.predicate.verifier.id // "N/A"' "$VSA_FILE")" >> $GITHUB_STEP_SUMMARY
            echo "#### Time Verified: $(jq -r '.predicate.timeVerified // "N/A"' "$VSA_FILE")" >> $GITHUB_STEP_SUMMARY
            echo "#### Policy URI: $(jq -r '.predicate.policy.uri // "N/A"' "$VSA_FILE")" >> $GITHUB_STEP_SUMMARY
            echo "#### SLSA Levels: $(jq -r '.predicate.verifiedLevels | join(", ") // "N/A"' "$VSA_FILE")" >> $GITHUB_STEP_SUMMARY

            SUBJECT_COUNT=$(jq '.subject | length' "$VSA_FILE")
            if [ "$SUBJECT_COUNT" -gt 1 ]; then
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "#### Verified Subjects:" >> $GITHUB_STEP_SUMMARY
              jq -r '.subject[] | "- \(.uri // .name // "unknown")"' "$VSA_FILE" >> $GITHUB_STEP_SUMMARY
            fi

            echo "" >> $GITHUB_STEP_SUMMARY
            echo "#### VSA File: $(basename "$VSA_FILE")" >> $GITHUB_STEP_SUMMARY
          else
            echo "No VSA file found" >> $GITHUB_STEP_SUMMARY
          fi
      - name: Attest to VSA for Image
        if: ${{ inputs.build-type == 'image' }}
        uses: actions/attest@ce27ba3b4a9a139d9a20a4a07d69fabb52f1e5bc # v2.4.0
        with:
          subject-name: ${{ format('{0}/{1}', inputs.registry, inputs.subject-name) }}
          subject-digest: ${{ inputs.image-digest }}
          predicate-type: 'https://slsa.dev/verification_summary/v1'
          predicate-path: ${{ env.VSA_FOLDER }}/verification-summary-attestation-${{ steps.verify-image.outputs.result-status }}.json
          push-to-registry: true
          github-token: ${{ inputs.github-token || github.token }}
      - name: Attest to VSA for Blob
        if: ${{ inputs.build-type == 'blob' }}
        uses: actions/attest@ce27ba3b4a9a139d9a20a4a07d69fabb52f1e5bc # v2.4.0
        with:
          subject-path: ${{ env.ARTIFACTS_FOLDER }}
          predicate-type: 'https://slsa.dev/verification_summary/v1'
          predicate-path: ${{ env.VSA_FOLDER }}/verification-summary-attestations-${{ steps.verify-blob.outputs.result-status }}.json
          push-to-registry: true
          github-token: ${{ inputs.github-token || github.token }}
      - name: Upload VSA Artifact
        id: upload-vsa-artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: verification-summary-attestation-high-perms
          path: ${{ env.VSA_FOLDER }}/verification-summary-attestation${{ inputs.build-type == 'blob' && 's' || '' }}-${{ (inputs.build-type == 'image' && steps.verify-image.outputs.result-status) || (inputs.build-type == 'blob' && steps.verify-blob.outputs.result-status) }}.json
          if-no-files-found: error
