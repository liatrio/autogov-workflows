name: Build Image Low Permissions Reuseable Workflow

on:
  workflow_call:
    inputs:
      subject-name:
        description: >
          Subject name as it should appear in the attestation. Required unless
          "subject-path" is specified, in which case it will be inferred from the
          path.
        required: true
        type: string
      cert-identity:
        type: string
        description: >
          The certificate identity of the signer workflow, or builder, used in the verify job to ensure artifacts and attestations can be verified against the source repository and correct workflow using the gh-cli (e.g. --cert-identity flag). If verifying an image, the workflow name should be rw-<permissions_path>-attest-image.yaml, if verifying blob(s), the workflow name should be rw-<permissions_path>-attest-blob.yaml
        required: true

permissions: {}

jobs:
  attest-image: #image
    permissions:
      id-token: write
      attestations: write
      packages: read
      contents: read
    uses: ./.github/workflows/rw-lp-attest-image.yaml
    secrets: inherit
    with:
      subject-name: ghcr.io/${{ github.repository }}

  verify-image: #image
    permissions:
      contents: read
    needs: [attest-image]
    uses: ./.github/workflows/rw-lp-verify.yaml
    secrets: inherit
    with:
      build-type: image
      image-artifact-id: ${{ needs.attest-image.outputs.image-artifact-id }}
      attest-build-attestation-artifact-id: ${{ needs.attest-image.outputs.attest-build-attestation-artifact-id }}
      attest-metadata-attestations-artifact-id: ${{ needs.attest-image.outputs.attest-metadata-attestations-artifact-id }}
      attest-sbom-attestations-artifact-id: ${{ needs.attest-image.outputs.attest-sbom-attestations-artifact-id }}
      cert-identity: ${{ inputs.cert-identity }}

  run-opa-image: #image
    permissions:
      contents: read
      id-token: write
    needs: [verify-image, attest-image]
    uses: ./.github/workflows/rw-lp-run-opa.yaml
    secrets: inherit
    with:
      build-type: image
      attest-build-attestation-artifact-id: ${{ needs.attest-image.outputs.attest-build-attestation-artifact-id }}
      attest-metadata-attestations-artifact-id: ${{ needs.attest-image.outputs.attest-metadata-attestations-artifact-id }}
      attest-sbom-attestations-artifact-id: ${{ needs.attest-image.outputs.attest-sbom-attestations-artifact-id }}

  release-image: #image
    permissions:
      contents: write
    needs: [verify-image, attest-image, run-opa-image]
    uses: ./.github/workflows/rw-lp-release.yaml
    secrets: inherit
    with:
      build-type: image
      attest-build-attestation-artifact-id: ${{ needs.attest-image.outputs.attest-build-attestation-artifact-id }}
      attest-metadata-attestations-artifact-id: ${{ needs.attest-image.outputs.attest-metadata-attestations-artifact-id }}
      attest-sbom-attestations-artifact-id: ${{ needs.attest-image.outputs.attest-sbom-attestations-artifact-id }}
      image-artifact-id: ${{ needs.attest-image.outputs.image-artifact-id }}
      results-artifact-id: ${{ needs.run-opa-image.outputs.results-artifact-id }}
