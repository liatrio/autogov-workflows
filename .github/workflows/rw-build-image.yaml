name: Build Image Reusable Workflow

on:
  workflow_call:
    inputs:
      subject-name:
        description: >
          Subject name as it should appear in the attestation. Required unless
          "subject-path" is specified, in which case it will be inferred from the
          path.
        required: true
        type: string
      registry:
        description: Container registry to push image.
        default: ghcr.io
        required: false
        type: string
      cert-identity:
        description: >
          The certificate identity of the signer workflow, or builder, used in the verify job to ensure artifacts and attestations can be verified against the source repository and correct workflow using the gh-cli (e.g. --cert-identity flag). The workflow name should be rw-attest-image.yaml.
        required: true
        type: string
      autogov-version:
        description: The autogov version to use.
        required: false
        type: string
        default: v0.29.8
      octo-sts-read-scope:
        description: >
          octo-sts scope for the release job's autogov CLI download. Leave empty
          to use github.token — correct for public repos.
        required: false
        type: string
        default: ''
      octo-sts-read-identity:
        description: octo-sts read identity for the release job (used only when octo-sts-read-scope is set).
        required: false
        type: string
        default: ''
      octo-sts-release-scope:
        description: >
          octo-sts scope for the release write path (cut commit/tag and asset
          upload). Defaults to liatrio. External orgs with a protected main must
          override this with their own scope whose octo-sts app is on the branch
          ruleset bypass list.
        required: false
        type: string
        default: liatrio
      octo-sts-release-identity:
        description: octo-sts write identity for the release cut and asset upload.
        required: false
        type: string
        default: release-ops
      octo-sts-scope:
        description: >
          octo-sts scope for the private-repo autogov CLI download. Leave empty
          to use github-token — correct for public repos.
        required: false
        type: string
        default: ''
      octo-sts-identity:
        description: octo-sts identity (used only when octo-sts-scope is set).
        required: false
        type: string
        default: ''
      autogov-repo:
        description: Repository to download the autogov CLI release from.
        required: false
        type: string
        default: liatrio/autogov
      release-image:
        description: Whether or not to run the release-image job.
        required: false
        type: boolean
        default: true
      vuln-threshold-critical:
        description: 'Maximum critical vulnerabilities allowed (0=none, -1=unlimited)'
        required: false
        type: string
        default: '0'
      vuln-threshold-high:
        description: 'Maximum high vulnerabilities allowed (0=none, -1=unlimited)'
        required: false
        type: string
        default: '0'
      vuln-threshold-medium:
        description: 'Maximum medium vulnerabilities allowed (0=none, -1=unlimited)'
        required: false
        type: string
        default: '0'
      vuln-threshold-low:
        description: 'Maximum low vulnerabilities allowed (0=none, -1=unlimited)'
        required: false
        type: string
        default: '0'
    outputs:
      attest-build-attestation-artifact-id:
        description: "Attestation artifact ID"
        value: ${{ jobs.attest-image.outputs.attest-build-attestation-artifact-id }}
      attest-metadata-attestation-artifact-id:
        description: "Metadata artifact ID"
        value: ${{ jobs.attest-image.outputs.attest-metadata-attestation-artifact-id }}
      attest-sbom-attestation-artifact-id:
        description: "SBOM artifact ID"
        value: ${{ jobs.attest-image.outputs.attest-sbom-attestation-artifact-id }}
      attest-dependency-scan-attestation-artifact-id:
        description: "Dependency scan artifact ID"
        value: ${{ jobs.attest-image.outputs.attest-dependency-scan-attestation-artifact-id }}
      attest-source-review-attestation-artifact-id:
        description: "Source-review (PR-approval) artifact ID"
        value: ${{ jobs.attest-image.outputs.attest-source-review-attestation-artifact-id }}
      image-digest:
        description: "image-digest"
        value: ${{ jobs.attest-image.outputs.image-digest }}
      vsa-artifact-id:
        description: "VSA artifact ID"
        value: ${{ jobs.verify-image.outputs.vsa-artifact-id }}

permissions: {}

jobs:
  attest-image:
    permissions:
      id-token: write
      attestations: write
      packages: write
      contents: read
      actions: read
      artifact-metadata: write
      # passed through to the nested source-review attestation job (reads PR reviews)
      pull-requests: read
    uses: ./.github/workflows/rw-attest-image.yaml
    secrets: inherit
    with:
      subject-name: ${{ github.repository }}
      registry: ${{ inputs.registry }}
      autogov-version: ${{ inputs.autogov-version }}
      octo-sts-scope: ${{ inputs.octo-sts-scope }}
      octo-sts-identity: ${{ inputs.octo-sts-identity }}
      autogov-repo: ${{ inputs.autogov-repo }}

  verify-image:
    permissions:
      id-token: write
      attestations: write
      packages: write
      contents: read
      actions: read
      artifact-metadata: write
    needs: [attest-image]
    uses: ./.github/workflows/rw-verify.yaml
    secrets: inherit
    with:
      build-type: image
      subject-name: ${{ inputs.subject-name }}
      image-digest: ${{ needs.attest-image.outputs.image-digest }}
      registry: ${{ inputs.registry }}
      cert-identity: ${{ inputs.cert-identity }}
      autogov-version: ${{ inputs.autogov-version }}
      octo-sts-scope: ${{ inputs.octo-sts-scope }}
      octo-sts-identity: ${{ inputs.octo-sts-identity }}
      autogov-repo: ${{ inputs.autogov-repo }}
      vuln-threshold-critical: ${{ inputs.vuln-threshold-critical }}
      vuln-threshold-high: ${{ inputs.vuln-threshold-high }}
      vuln-threshold-medium: ${{ inputs.vuln-threshold-medium }}
      vuln-threshold-low: ${{ inputs.vuln-threshold-low }}

  release-image:
    permissions:
      contents: write
      id-token: write
      actions: read
    needs: [verify-image, attest-image]
    if: ${{ inputs.release-image }}
    uses: ./.github/workflows/rw-release.yaml
    secrets: inherit
    with:
      mutations-config: .autogov-release.yaml
      autogov-version: ${{ inputs.autogov-version }}
      vsa-artifact-id: ${{ needs.verify-image.outputs.vsa-artifact-id }}
      octo-sts-read-scope: ${{ inputs.octo-sts-read-scope }}
      octo-sts-read-identity: ${{ inputs.octo-sts-read-identity }}
      octo-sts-release-scope: ${{ inputs.octo-sts-release-scope }}
      octo-sts-release-identity: ${{ inputs.octo-sts-release-identity }}
