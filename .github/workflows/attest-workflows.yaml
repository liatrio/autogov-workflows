name: Attest Workflow Files

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/rw-*.y*ml'
      - '.github/actions/**/action.y*ml'
      - '.github/workflows/attest-workflows.yaml'
  workflow_dispatch:

concurrency:
  group: attest-workflows-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  attest:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      attestations: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
      - name: Attest Workflow Files Provenance
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          github-token: ${{ github.token }}
          subject-path: |
            .github/workflows/rw-*.y*ml
            .github/actions/**/action.y*ml
          push-to-registry: false
