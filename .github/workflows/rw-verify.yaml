name: Verify Reusable Workflow

on:
  workflow_call:
    inputs:
      build-type:
        description: 'Specify the type of build: "image" or "blob".'
        required: true
        type: string
      subject-name:
        description: >
          Subject name as it should appear in the attestation. Required unless
          "subject-path" is specified, in which case it will be inferred from the
          path.
        default: ${{ github.repository }}
        required: false
        type: string
      image-digest:
        description: The digest of the image that was built and pushed
        default: ${{ inputs.build-type == 'image' && github.event.needs.build.outputs.image-digest }}
        required: false
        type: string
      registry:
        description: >
          The container registry to use.
        default: ghcr.io
        required: false
        type: string
      blob-artifact-id:
        description: The artifact-id of the build artifacts.
        default: ${{ inputs.build-type == 'blob' && github.event.needs.build.outputs.blob-artifact-id }}
        type: string
      cert-identity:
        description: >
          The certificate identity of the signer workflow, or builder, used in the verify job to ensure artifacts and attestations can be verified against the source repository and correct workflow using the gh-cli (e.g. --cert-identity flag). If verifying an image, the workflow name should be rw-attest-image.yaml, if verifying blob(s), the workflow name should be rw-attest-blob.yaml.
        required: true
        type: string
      github-token:
        description: >
          The GitHub token set throughout the reusable workflow including the composite (build) action.
        default: ''
        required: false
        type: string
      workflow-runner-label:
        description: The label of the workflow runner
        default: ubuntu-latest
        required: false
        type: string
      autogov-version:
        description: The autogov version to use (input name retained for backwards compatibility).
        required: false
        type: string
        default: v0.38.2
      use-cert-identity-list:
        description: Whether to use cert-identity-list for validation
        required: false
        type: boolean
        default: ${{ github.repository != 'liatrio/autogov-workflows' }}
      allow-failed-vsa:
        description: When false (default), a FAILED policy result fails this job AFTER the FAILED VSA has been attested and uploaded, so the record is preserved but the release is blocked. Set true to keep the advisory (non-gating) behavior.
        required: false
        type: boolean
        default: false
      vuln-threshold-critical:
        description: 'Maximum critical vulnerabilities allowed (0=none, -1=unlimited)'
        required: false
        type: string
        default: '0'
      vuln-threshold-high:
        description: 'Maximum high vulnerabilities allowed (0=none, -1=unlimited)'
        required: false
        type: string
        default: '0'
      vuln-threshold-medium:
        description: 'Maximum medium vulnerabilities allowed (0=none, -1=unlimited)'
        required: false
        type: string
        default: '0'
      vuln-threshold-low:
        description: 'Maximum low vulnerabilities allowed (0=none, -1=unlimited)'
        required: false
        type: string
        default: '0'
      policy-data-overlay:
        description: >
          Optional JSON merged over the generated vuln thresholds to enable
          per-repo gates such as source_review_config / bypass_config /
          code_scan_thresholds. Empty (default) disables the overlay.
        required: false
        type: string
        default: ''
      octo-sts-scope:
        description: >
          octo-sts scope for private-repo cross-repo reads (autogov CLI, policy bundle,
          cert-identities). Leave empty to use github-token — correct for public repos.
        required: false
        type: string
        default: ''
      octo-sts-identity:
        description: octo-sts identity (used only when octo-sts-scope is set).
        required: false
        type: string
        default: ''
      autogov-repo:
        description: Repository to download the autogov CLI release from.
        required: false
        type: string
        default: liatrio/autogov
      policy-repo:
        description: Repository hosting the OPA/Rego policy bundle (owner/name).
        required: false
        type: string
        default: liatrio/autogov-policy-library
      cert-identities-repo:
        description: Repository hosting cert-identities.json (the signer allowlist).
        required: false
        type: string
        default: liatrio/autogov-workflows
    outputs:
      vsa-artifact-id:
        description: The artifact ID of the uploaded VSA
        value: ${{ jobs.verify-high-perms.outputs.vsa-artifact-id }}

permissions: {}

env:
  GH_TOKEN: ${{ inputs.github-token || github.token }}
  ATTESTATIONS_FOLDER: ./attestations
  ARTIFACTS_FOLDER: ./artifacts
  VSA_FOLDER: ./vsa

jobs:
  verify-high-perms:
    outputs:
      vsa-artifact-id: ${{ steps.upload-vsa-artifact.outputs.artifact-id }}
    permissions:
      contents: read
      packages: write
      actions: read
      id-token: write
      attestations: write
      artifact-metadata: write
    runs-on: ${{ inputs.workflow-runner-label }}
    steps:
      - name: Fail if Runner is self-hosted
        if: ${{ runner.environment != 'github-hosted' }}
        run: |
          echo "Job is running on a self-hosted runner. Terminating job..."
          exit 1
      - name: Validate Inputs
        if: ${{ runner.environment == 'github-hosted' }}
        env:
          BUILD_TYPE: ${{ inputs.build-type }}
          IMAGE_DIGEST: ${{ inputs.image-digest }}
          BLOB_ARTIFACT_ID: ${{ inputs.blob-artifact-id }}
        run: |
          if [[ "$BUILD_TYPE" == "image" && -z "$IMAGE_DIGEST" ]]; then
            echo "Error: image-digest is required for build-type 'image'."
            exit 1
          elif [[ "$BUILD_TYPE" == "blob" && -z "$BLOB_ARTIFACT_ID" ]]; then
            echo "Error: blob-artifact-id is required for build-type 'blob'."
            exit 1
          fi
      - name: Login to GitHub Container Registry
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
        with:
          registry: ${{ inputs.registry }}
          username: ${{ github.actor }}
          password: ${{ inputs.github-token || github.token }}
      - name: Create Attestations, Artifacts, and VSA Folders
        run: mkdir ${{ env.ATTESTATIONS_FOLDER }} && mkdir ${{ env.ARTIFACTS_FOLDER }} && mkdir ${{ env.VSA_FOLDER }}
      - name: Download Blob Artifact(s)
        if: ${{ inputs.build-type == 'blob' }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          github-token: ${{ inputs.github-token || github.token }}
          artifact-ids: ${{ inputs.blob-artifact-id }}
          path: ${{ env.ARTIFACTS_FOLDER }}
          merge-multiple: true
      - name: Download Blob Artifact Attestation(s)
        if: ${{ inputs.build-type == 'blob' }}
        run: |
          cd ${{ env.ATTESTATIONS_FOLDER }}
          find ../${{ env.ARTIFACTS_FOLDER }} -type f -exec gh attestation download {} --repo ${{ github.repository }} \;
      - uses: octo-sts/action@f603d3be9d8dd9871a265776e625a27b00effe05 # v1.1.1
        id: octo-sts
        if: ${{ inputs.octo-sts-scope != '' }}
        with:
          scope: ${{ inputs.octo-sts-scope }}
          identity: ${{ inputs.octo-sts-identity }}
      - name: Install autogov
        env:
          GH_TOKEN: ${{ inputs.octo-sts-scope == '' && (inputs.github-token || github.token) || steps.octo-sts.outputs.token }}
          AUTOGOV_VERSION: ${{ inputs.autogov-version }}
          AUTOGOV_REPO: ${{ inputs.autogov-repo }}
        run: |
          gh release download "$AUTOGOV_VERSION" \
            --repo "$AUTOGOV_REPO" \
            --pattern "autogov"
          chmod +x autogov
      - name: Download cert-identities file
        if: ${{ inputs.use-cert-identity-list }}
        env:
          GH_TOKEN: ${{ inputs.octo-sts-scope == '' && (inputs.github-token || github.token) || steps.octo-sts.outputs.token }}
          CERT_IDENTITIES_REPO: ${{ inputs.cert-identities-repo }}
          GH_REPO: ${{ github.repository }}
          JOB_WF_SHA: ${{ github.job_workflow_sha }}
        run: |
          # Pin the allowlist fetch to the running reusable-workflow SHA when the
          # allowlist lives in this same repo, closing the TOCTOU between the
          # SHA-pinned `uses:` and a live-HEAD cert-identities.json. Fall back to
          # the default branch for a cross-repo allowlist or an empty
          # job_workflow_sha. Inputs reach the shell via env, never template splicing.
          ref_qs=""
          if [ "$CERT_IDENTITIES_REPO" = "$GH_REPO" ] && [ -n "$JOB_WF_SHA" ]; then
            ref_qs="?ref=$JOB_WF_SHA"
            echo "cert-identities.json pinned to job_workflow_sha $JOB_WF_SHA"
          else
            echo "cert-identities.json fetched from $CERT_IDENTITIES_REPO default branch (unpinned: cross-repo or empty job_workflow_sha)"
          fi
          gh api "repos/$CERT_IDENTITIES_REPO/contents/cert-identities.json$ref_qs" \
            --jq '.content' | base64 -d > cert-identities.json
      - name: Validate Vulnerability Thresholds
        env:
          VULN_CRITICAL: ${{ inputs.vuln-threshold-critical }}
          VULN_HIGH: ${{ inputs.vuln-threshold-high }}
          VULN_MEDIUM: ${{ inputs.vuln-threshold-medium }}
          VULN_LOW: ${{ inputs.vuln-threshold-low }}
        run: |
          for pair in \
            "vuln-threshold-critical=$VULN_CRITICAL" \
            "vuln-threshold-high=$VULN_HIGH" \
            "vuln-threshold-medium=$VULN_MEDIUM" \
            "vuln-threshold-low=$VULN_LOW"; do
            name="${pair%%=*}"
            val="${pair#*=}"
            if ! [[ "$val" =~ ^(-1|[0-9]+)$ ]]; then
              echo "error: $name must be -1 or a non-negative integer, got '$val'"
              exit 1
            fi
          done
      - name: Generate Vulnerability Threshold Config
        # Build the threshold JSON with jq --argjson from env-passed values so a
        # caller input is never spliced into this run: body as script text (the
        # quoted heredoc only blocked shell expansion, not ${{ }} template
        # substitution). An optional policy-data-overlay enables per-repo gates.
        env:
          VULN_CRITICAL: ${{ inputs.vuln-threshold-critical }}
          VULN_HIGH: ${{ inputs.vuln-threshold-high }}
          VULN_MEDIUM: ${{ inputs.vuln-threshold-medium }}
          VULN_LOW: ${{ inputs.vuln-threshold-low }}
          OVERLAY: ${{ inputs.policy-data-overlay }}
        run: |
          jq -n \
            --argjson c "$VULN_CRITICAL" \
            --argjson h "$VULN_HIGH" \
            --argjson m "$VULN_MEDIUM" \
            --argjson l "$VULN_LOW" \
            '{vuln_thresholds: {critical: $c, high: $h, medium: $m, low: $l}}' > vuln.json
          if [ -n "$OVERLAY" ]; then
            echo "$OVERLAY" | jq -e 'type == "object"' > /dev/null || { echo "error: policy-data-overlay must be a JSON object"; exit 1; }
            # the overlay enables ADDITIONAL gate keys (source_review_config /
            # bypass_config / code_scan_thresholds); it must not override the
            # vuln thresholds, which come only from the validated inputs above.
            if echo "$OVERLAY" | jq -e 'has("vuln_thresholds")' > /dev/null; then
              echo "error: policy-data-overlay must not set vuln_thresholds; use the validated vuln-threshold-* inputs"; exit 1
            fi
            jq -s '.[0] * .[1]' vuln.json <(echo "$OVERLAY") > policy-data.json
          else
            cp vuln.json policy-data.json
          fi
          echo "Generated policy data:"
          cat policy-data.json
      - name: Verification and VSA Generation for Image Attestation(s)
        env:
          GH_TOKEN: ${{ inputs.octo-sts-scope == '' && (inputs.github-token || github.token) || steps.octo-sts.outputs.token }}
          CERT_IDENTITY: ${{ inputs.cert-identity }}
          IMAGE_DIGEST: ${{ inputs.image-digest }}
          POLICY_REPO: ${{ inputs.policy-repo }}
        id: verify-image
        if: ${{ inputs.build-type == 'image' }}
        run: |
          set +x
          VSA_FILE="${{ env.VSA_FOLDER }}/verification-summary-attestation.json"
          ./autogov verify attestation \
            --image-digest "$IMAGE_DIGEST" \
            --repo "${{ github.repository }}" \
            --cert-identity "$CERT_IDENTITY" \
            --source-ref "${{ github.ref }}" \
            --policy-bundle-path "ghrel://$POLICY_REPO?asset=bundle.tar.gz" \
            --policy-schemas-path "ghrel://$POLICY_REPO?asset=schemas.tar.gz" \
            --policy-data-path "policy-data.json" \
            --policy-uri "https://github.com/$POLICY_REPO" \
            --generate-vsa \
            --vsa-output "$VSA_FILE" \
            ${{ inputs.use-cert-identity-list && '--cert-identity-list cert-identities.json' || '' }}

          if [ -f "$VSA_FILE" ]; then
            RESULT_STATUS=$(jq -r '.predicate.verificationResult // "UNKNOWN"' "$VSA_FILE")
            echo "result-status=$RESULT_STATUS" >> $GITHUB_OUTPUT

            VSA_FILE_WITH_STATUS="${{ env.VSA_FOLDER }}/verification-summary-attestation-$RESULT_STATUS.json"
            mv "$VSA_FILE" "$VSA_FILE_WITH_STATUS"
          else
            echo "result-status=UNKNOWN" >> $GITHUB_OUTPUT
          fi
      - name: Verification and VSA Generation for Blob Attestation(s)
        id: verify-blob
        if: ${{ inputs.build-type == 'blob' }}
        env:
          GH_TOKEN: ${{ inputs.octo-sts-scope == '' && (inputs.github-token || github.token) || steps.octo-sts.outputs.token }}
          CERT_IDENTITY: ${{ inputs.cert-identity }}
          POLICY_REPO: ${{ inputs.policy-repo }}
        run: |
          set +x
          VSA_FILE="${{ env.VSA_FOLDER }}/verification-summary-attestation.json"

          ARTIFACT_COUNT=$(find ${{ env.ARTIFACTS_FOLDER }} -type f | wc -l)
          echo "Found $ARTIFACT_COUNT artifact(s) to verify in ${{ env.ARTIFACTS_FOLDER }}"

          if [ "$ARTIFACT_COUNT" -gt 0 ]; then
            echo "Artifacts to verify:"
            find ${{ env.ARTIFACTS_FOLDER }} -type f -exec basename {} \;

            ./autogov verify attestation \
              --blob-path "${{ env.ARTIFACTS_FOLDER }}" \
              --repo "${{ github.repository }}" \
              --cert-identity "$CERT_IDENTITY" \
              --source-ref "${{ github.ref }}" \
              --policy-bundle-path "ghrel://$POLICY_REPO?asset=bundle.tar.gz" \
              --policy-schemas-path "ghrel://$POLICY_REPO?asset=schemas.tar.gz" \
              --policy-data-path "policy-data.json" \
              --policy-uri "https://github.com/$POLICY_REPO" \
              --generate-vsa \
              --vsa-output "$VSA_FILE" \
              ${{ inputs.use-cert-identity-list && '--cert-identity-list cert-identities.json' || '' }}

            if [ -f "$VSA_FILE" ]; then
              RESULT_STATUS=$(jq -r '.predicate.verificationResult // "UNKNOWN"' "$VSA_FILE")
              echo "result-status=$RESULT_STATUS" >> $GITHUB_OUTPUT

              VSA_FILE_WITH_STATUS="${{ env.VSA_FOLDER }}/verification-summary-attestation-$RESULT_STATUS.json"
              mv "$VSA_FILE" "$VSA_FILE_WITH_STATUS"
            else
              echo "result-status=UNKNOWN" >> $GITHUB_OUTPUT
            fi
          else
            echo "result-status=UNKNOWN" >> $GITHUB_OUTPUT
          fi
      - name: Display VSA Summary
        run: |
          VSA_FILE=$(find ${{ env.VSA_FOLDER }} -name "verification-summary-attestation*.json*" | head -1)
          if [ -f "$VSA_FILE" ]; then
            echo "### Verification Summary Attestation (VSA) Results" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            VERIFICATION_RESULT=$(jq -r '.predicate.verificationResult // "UNKNOWN"' "$VSA_FILE")
            case "$VERIFICATION_RESULT" in
              "true"|"PASSED") RESULT_STATUS="PASSED" ;;
              "false"|"FAILED") RESULT_STATUS="FAILED" ;;
              *) RESULT_STATUS="UNKNOWN" ;;
            esac

            if [ "$RESULT_STATUS" = "PASSED" ]; then
              echo "#### Result: ✅ PASSED" >> $GITHUB_STEP_SUMMARY
            elif [ "$RESULT_STATUS" = "FAILED" ]; then
              echo "#### Result: ❌ FAILED" >> $GITHUB_STEP_SUMMARY
            else
              echo "#### Result: ⚠ UNKNOWN" >> $GITHUB_STEP_SUMMARY
            fi

            echo "- Verifier: $(jq -r '.predicate.verifier.id // "N/A"' "$VSA_FILE")" >> $GITHUB_STEP_SUMMARY
            echo "- Time Verified: $(jq -r '.predicate.timeVerified // "N/A"' "$VSA_FILE")" >> $GITHUB_STEP_SUMMARY
            echo "- Policy URI: $(jq -r '.predicate.policy.uri // "N/A"' "$VSA_FILE")" >> $GITHUB_STEP_SUMMARY

            if [ "$RESULT_STATUS" = "FAILED" ]; then
              VIOLATION_COUNT=$(jq -r '.metadata."autogov.policy.evaluation".violations | length // 0' "$VSA_FILE")
              if [ "$VIOLATION_COUNT" -gt 0 ]; then
                echo "" >> $GITHUB_STEP_SUMMARY
                echo "#### 🚨 Policy Violations ($VIOLATION_COUNT)" >> $GITHUB_STEP_SUMMARY
                echo "" >> $GITHUB_STEP_SUMMARY
                echo "| Policy | Message |" >> $GITHUB_STEP_SUMMARY
                echo "|--------|---------|" >> $GITHUB_STEP_SUMMARY
                jq -r '.metadata."autogov.policy.evaluation".violations[] | "| \(.policy) | \(.message) |"' "$VSA_FILE" >> $GITHUB_STEP_SUMMARY
              fi
            fi

            echo "" >> $GITHUB_STEP_SUMMARY
            echo "#### VSA File: $(basename "$VSA_FILE")" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ No VSA file found" >> $GITHUB_STEP_SUMMARY
          fi
      - name: Attest to VSA for Image
        if: ${{ inputs.build-type == 'image' }}
        id: attest-vsa-image
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-name: ${{ format('{0}/{1}', inputs.registry, inputs.subject-name) }}
          subject-digest: ${{ inputs.image-digest }}
          predicate-type: 'https://slsa.dev/verification_summary/v1'
          predicate-path: ${{ env.VSA_FOLDER }}/verification-summary-attestation-${{ steps.verify-image.outputs.result-status }}.json
          push-to-registry: true
          github-token: ${{ inputs.github-token || github.token }}
      - name: Attest to VSA for Blob
        if: ${{ inputs.build-type == 'blob' }}
        id: attest-vsa-blob
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: ${{ env.ARTIFACTS_FOLDER }}
          predicate-type: 'https://slsa.dev/verification_summary/v1'
          predicate-path: ${{ env.VSA_FOLDER }}/verification-summary-attestation-${{ steps.verify-blob.outputs.result-status }}.json
          push-to-registry: false
          github-token: ${{ inputs.github-token || github.token }}
      - name: Rename VSA Bundle
        id: rename-vsa-bundle
        env:
          BUILD_TYPE: ${{ inputs.build-type }}
        run: |
          if [ "$BUILD_TYPE" = "image" ]; then
            BUNDLE_DIR=$(dirname "${{ steps.attest-vsa-image.outputs.bundle-path }}")
            VSA_PATH="$BUNDLE_DIR/vsa-${{ steps.verify-image.outputs.result-status }}.json"
            mv "${{ steps.attest-vsa-image.outputs.bundle-path }}" "$VSA_PATH"
          else
            BUNDLE_DIR=$(dirname "${{ steps.attest-vsa-blob.outputs.bundle-path }}")
            VSA_PATH="$BUNDLE_DIR/vsa-${{ steps.verify-blob.outputs.result-status }}.json"
            mv "${{ steps.attest-vsa-blob.outputs.bundle-path }}" "$VSA_PATH"
          fi
          echo "vsa-bundle-path=$VSA_PATH" >> $GITHUB_OUTPUT
      - name: Upload Signed VSA Bundle Artifact
        id: upload-vsa-artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: verification-summary-attestation-high-perms
          path: ${{ steps.rename-vsa-bundle.outputs.vsa-bundle-path }}
          if-no-files-found: error
      - name: Enforce Policy Gate
        # default-deny: block unless the active build-type's verify step reported
        # exactly PASSED. anything else (FAILED, UNKNOWN, empty, or a drifted CLI
        # string) blocks the release. scoped to inputs.build-type so the skipped
        # build-type's empty output never spuriously gates. the gate depends on the
        # autogov CLI emitting verificationResult exactly PASSED on a clean policy
        # result; it does not rely on --fail-on-policy-error (the FAILED VSA must be
        # attested + uploaded above before the gate fires).
        if: ${{ !inputs.allow-failed-vsa && ((inputs.build-type == 'image' && steps.verify-image.outputs.result-status != 'PASSED') || (inputs.build-type == 'blob' && steps.verify-blob.outputs.result-status != 'PASSED')) }}
        run: |
          echo "::error::policy result was not PASSED — failing the job (allow-failed-vsa=false). the VSA was attested and uploaded above."
          exit 1
