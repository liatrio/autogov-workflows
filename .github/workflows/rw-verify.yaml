name: Verify Reusable Workflow

on:
  workflow_call:
    inputs:
      build-type:
        description: 'Specify the type of build: "image" or "blob".'
        required: true
        type: string
      subject-name:
        description: >
          Subject name as it should appear in the attestation. Required unless
          "subject-path" is specified, in which case it will be inferred from the
          path.
        default: ${{ github.repository }}
        required: false
        type: string
      image-digest:
        description: The digest of the image that was built and pushed
        default: ${{ inputs.build-type == 'image' && github.event.needs.build.outputs.image-digest }}
        required: false
        type: string
      registry:
        description: >
          The container registry to use.
        default: ghcr.io
        required: false
        type: string
      blob-artifact-id:
        description: The artifact-id of the build artifacts.
        default: ${{ inputs.build-type == 'blob' && github.event.needs.build.outputs.blob-artifact-id }}
        type: string
      cert-identity:
        description: >
          The certificate identity of the signer workflow, or builder, used in the verify job to ensure artifacts and attestations can be verified against the source repository and correct workflow using the gh-cli (e.g. --cert-identity flag). If verifying an image, the workflow name should be rw-attest-image.yaml, if verifying blob(s), the workflow name should be rw-attest-blob.yaml.
        required: true
        type: string
      github-token:
        description: >
          The GitHub token set throughout the reusable workflow including the composite (build) action.
        default: ''
        required: false
        type: string
      workflow-runner-label:
        description: The label of the workflow runner
        default: ubuntu-latest
        required: false
        type: string
      autogov-version:
        description: The autogov version to use (input name retained for backwards compatibility).
        required: false
        type: string
        default: v0.18.3
      use-cert-identity-list:
        description: Whether to use cert-identity-list for validation
        required: false
        type: boolean
        default: ${{ github.repository != 'liatrio/liatrio-gh-autogov-workflows' }}
      vuln-threshold-critical:
        description: 'Maximum critical vulnerabilities allowed (0=none, -1=unlimited)'
        required: false
        type: string
        default: '0'
      vuln-threshold-high:
        description: 'Maximum high vulnerabilities allowed (0=none, -1=unlimited)'
        required: false
        type: string
        default: '0'
      vuln-threshold-medium:
        description: 'Maximum medium vulnerabilities allowed (0=none, -1=unlimited)'
        required: false
        type: string
        default: '0'
      vuln-threshold-low:
        description: 'Maximum low vulnerabilities allowed (0=none, -1=unlimited)'
        required: false
        type: string
        default: '0'
    outputs:
      vsa-artifact-id:
        description: The artifact ID of the uploaded VSA
        value: ${{ jobs.verify-high-perms.outputs.vsa-artifact-id }}

permissions: {}

env:
  GH_TOKEN: ${{ inputs.github-token || github.token }}
  ATTESTATIONS_FOLDER: ./attestations
  ARTIFACTS_FOLDER: ./artifacts
  VSA_FOLDER: ./vsa
  POLICY_REPO_NAME: liatrio-rego-policy-library

jobs:
  verify-high-perms:
    outputs:
      vsa-artifact-id: ${{ steps.upload-vsa-artifact.outputs.artifact-id }}
    permissions:
      contents: read
      packages: write
      actions: read
      id-token: write
      attestations: write
      artifact-metadata: write
    runs-on: ${{ inputs.workflow-runner-label }}
    steps:
      - name: Fail if Runner is self-hosted
        if: ${{ runner.environment != 'github-hosted' }}
        run: |
          echo "Job is running on a self-hosted runner. Terminating job..."
          exit 1
      - name: Validate Inputs
        if: ${{ runner.environment == 'github-hosted' }}
        run: |
          if [[ "${{ inputs.build-type }}" == "image" && -z "${{ inputs.image-digest }}" ]]; then
            echo "Error: image-digest is required for build-type 'image'."
            exit 1
          elif [[ "${{ inputs.build-type }}" == "blob" && -z "${{ inputs.blob-artifact-id}}" ]]; then
            echo "Error: blob-artifact-id is required for build-type 'blob'."
            exit 1
          fi
      - name: Login to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ${{ inputs.registry }}
          username: ${{ github.actor }}
          password: ${{ inputs.github-token || github.token }}
      - name: Create Attestations, Artifacts, and VSA Folders
        run: mkdir ${{ env.ATTESTATIONS_FOLDER }} && mkdir ${{ env.ARTIFACTS_FOLDER }} && mkdir ${{ env.VSA_FOLDER }}
      - name: Download Blob Artifact(s)
        if: ${{ inputs.build-type == 'blob' }}
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          github-token: ${{ inputs.github-token || github.token }}
          artifact-ids: ${{ inputs.blob-artifact-id }}
          path: ${{ env.ARTIFACTS_FOLDER }}
          merge-multiple: true
      - name: Download Blob Artifact Attestation(s)
        if: ${{ inputs.build-type == 'blob' }}
        run: |
          cd ${{ env.ATTESTATIONS_FOLDER }}
          find ../${{ env.ARTIFACTS_FOLDER }} -type f -exec gh attestation download {} --repo ${{ github.repository }} \;
      - uses: octo-sts/action@f603d3be9d8dd9871a265776e625a27b00effe05 # v1.1.1
        id: octo-sts
        with:
          scope: liatrio
          identity: autogov-infra
      - name: Setup ORAS
        uses: oras-project/setup-oras@22ce207df3b08e061f537244349aac6ae1d214f6 # v1.2.4
      - name: Install autogov
        env:
          GH_TOKEN: ${{ steps.octo-sts.outputs.token }}
        run: |
          gh release download ${{ inputs.autogov-version }} \
            --repo liatrio/autogov \
            --pattern "autogov"
          chmod +x autogov
      - name: Download cert-identities file
        if: ${{ inputs.use-cert-identity-list }}
        env:
          GH_TOKEN: ${{ steps.octo-sts.outputs.token }}
        run: |
          gh api repos/liatrio/liatrio-gh-autogov-workflows/contents/cert-identities.json \
            --jq '.content' | base64 -d > cert-identities.json
      - name: Download Policy Bundle
        env:
          GH_TOKEN: ${{ steps.octo-sts.outputs.token }}
        run: |
          set +x
          oras pull \
            ghcr.io/${{ github.repository_owner }}/${{ env.POLICY_REPO_NAME }}:latest
      - name: Download Policy Schemas
        env:
          GH_TOKEN: ${{ steps.octo-sts.outputs.token }}
        run: |
          gh release download \
            --repo ${{ github.repository_owner }}/${{ env.POLICY_REPO_NAME }} \
            --pattern "schemas.tar.gz"
      - name: Generate Vulnerability Threshold Config
        run: |
          cat > vulnerability-thresholds.json << 'EOF'
          {
            "vuln_thresholds": {
              "critical": ${{ inputs.vuln-threshold-critical }},
              "high": ${{ inputs.vuln-threshold-high }},
              "medium": ${{ inputs.vuln-threshold-medium }},
              "low": ${{ inputs.vuln-threshold-low }}
            }
          }
          EOF
          echo "Generated vulnerability threshold config:"
          cat vulnerability-thresholds.json
      - name: Verification and VSA Generation for Image Attestation(s)
        env:
          GH_TOKEN: ${{ inputs.github-token || github.token }}
        id: verify-image
        if: ${{ inputs.build-type == 'image' }}
        run: |
          set +x
          VSA_FILE="${{ env.VSA_FOLDER }}/verification-summary-attestation.json"
          ./autogov verify attestation \
            --image-digest "${{ inputs.image-digest }}" \
            --repo "${{ github.repository }}" \
            --cert-identity "${{ inputs.cert-identity }}" \
            --source-ref "${{ github.ref }}" \
            --policy-bundle-path "bundle.tar.gz" \
            --policy-schemas-path "schemas.tar.gz" \
            --policy-data-path "vulnerability-thresholds.json" \
            --policy-uri "https://github.com/${{ github.repository_owner }}/${{ env.POLICY_REPO_NAME }}" \
            --generate-vsa \
            --vsa-output "$VSA_FILE" \
            ${{ inputs.use-cert-identity-list && '--cert-identity-list cert-identities.json' || '' }}

          if [ -f "$VSA_FILE" ]; then
            RESULT_STATUS=$(jq -r '.predicate.verificationResult // "UNKNOWN"' "$VSA_FILE")
            echo "result-status=$RESULT_STATUS" >> $GITHUB_OUTPUT

            VSA_FILE_WITH_STATUS="${{ env.VSA_FOLDER }}/verification-summary-attestation-$RESULT_STATUS.json"
            mv "$VSA_FILE" "$VSA_FILE_WITH_STATUS"
          else
            echo "result-status=UNKNOWN" >> $GITHUB_OUTPUT
          fi
      - name: Verification and VSA Generation for Blob Attestation(s)
        id: verify-blob
        if: ${{ inputs.build-type == 'blob' }}
        run: |
          set +x
          VSA_FILE="${{ env.VSA_FOLDER }}/verification-summary-attestation.json"

          ARTIFACT_COUNT=$(find ${{ env.ARTIFACTS_FOLDER }} -type f | wc -l)
          echo "Found $ARTIFACT_COUNT artifact(s) to verify in ${{ env.ARTIFACTS_FOLDER }}"

          if [ "$ARTIFACT_COUNT" -gt 0 ]; then
            echo "Artifacts to verify:"
            find ${{ env.ARTIFACTS_FOLDER }} -type f -exec basename {} \;

            ./autogov verify attestation \
              --blob-path "${{ env.ARTIFACTS_FOLDER }}" \
              --repo "${{ github.repository }}" \
              --cert-identity "${{ inputs.cert-identity }}" \
              --source-ref "${{ github.ref }}" \
              --policy-bundle-path "bundle.tar.gz" \
              --policy-schemas-path "schemas.tar.gz" \
              --policy-data-path "vulnerability-thresholds.json" \
              --policy-uri "https://github.com/${{ github.repository_owner }}/${{ env.POLICY_REPO_NAME }}" \
              --generate-vsa \
              --vsa-output "$VSA_FILE" \
              ${{ inputs.use-cert-identity-list && '--cert-identity-list cert-identities.json' || '' }}

            if [ -f "$VSA_FILE" ]; then
              RESULT_STATUS=$(jq -r '.predicate.verificationResult // "UNKNOWN"' "$VSA_FILE")
              echo "result-status=$RESULT_STATUS" >> $GITHUB_OUTPUT

              VSA_FILE_WITH_STATUS="${{ env.VSA_FOLDER }}/verification-summary-attestation-$RESULT_STATUS.json"
              mv "$VSA_FILE" "$VSA_FILE_WITH_STATUS"
            else
              echo "result-status=UNKNOWN" >> $GITHUB_OUTPUT
            fi
          else
            echo "result-status=UNKNOWN" >> $GITHUB_OUTPUT
          fi
      - name: Display VSA Summary
        run: |
          VSA_FILE=$(find ${{ env.VSA_FOLDER }} -name "verification-summary-attestation*.json*" | head -1)
          if [ -f "$VSA_FILE" ]; then
            echo "### Verification Summary Attestation (VSA) Results" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            VERIFICATION_RESULT=$(jq -r '.predicate.verificationResult // "UNKNOWN"' "$VSA_FILE")
            case "$VERIFICATION_RESULT" in
              "true"|"PASSED") RESULT_STATUS="PASSED" ;;
              "false"|"FAILED") RESULT_STATUS="FAILED" ;;
              *) RESULT_STATUS="UNKNOWN" ;;
            esac

            if [ "$RESULT_STATUS" = "PASSED" ]; then
              echo "#### Result: ✅ PASSED" >> $GITHUB_STEP_SUMMARY
            elif [ "$RESULT_STATUS" = "FAILED" ]; then
              echo "#### Result: ❌ FAILED" >> $GITHUB_STEP_SUMMARY
            else
              echo "#### Result: ⚠ UNKNOWN" >> $GITHUB_STEP_SUMMARY
            fi

            echo "- Verifier: $(jq -r '.predicate.verifier.id // "N/A"' "$VSA_FILE")" >> $GITHUB_STEP_SUMMARY
            echo "- Time Verified: $(jq -r '.predicate.timeVerified // "N/A"' "$VSA_FILE")" >> $GITHUB_STEP_SUMMARY
            echo "- Policy URI: $(jq -r '.predicate.policy.uri // "N/A"' "$VSA_FILE")" >> $GITHUB_STEP_SUMMARY

            if [ "$RESULT_STATUS" = "FAILED" ]; then
              VIOLATION_COUNT=$(jq -r '.metadata."autogov.policy.evaluation".violations | length // 0' "$VSA_FILE")
              if [ "$VIOLATION_COUNT" -gt 0 ]; then
                echo "" >> $GITHUB_STEP_SUMMARY
                echo "#### 🚨 Policy Violations ($VIOLATION_COUNT)" >> $GITHUB_STEP_SUMMARY
                echo "" >> $GITHUB_STEP_SUMMARY
                echo "| Policy | Message |" >> $GITHUB_STEP_SUMMARY
                echo "|--------|---------|" >> $GITHUB_STEP_SUMMARY
                jq -r '.metadata."autogov.policy.evaluation".violations[] | "| \(.policy) | \(.message) |"' "$VSA_FILE" >> $GITHUB_STEP_SUMMARY
              fi
            fi

            echo "" >> $GITHUB_STEP_SUMMARY
            echo "#### VSA File: $(basename "$VSA_FILE")" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ No VSA file found" >> $GITHUB_STEP_SUMMARY
          fi
      - name: Attest to VSA for Image
        if: ${{ inputs.build-type == 'image' }}
        id: attest-vsa-image
        uses: actions/attest@e59cbc1ad1ac2d59339667419eb8cdde6eb61e3d # v3.2.0
        with:
          subject-name: ${{ format('{0}/{1}', inputs.registry, inputs.subject-name) }}
          subject-digest: ${{ inputs.image-digest }}
          predicate-type: 'https://slsa.dev/verification_summary/v1'
          predicate-path: ${{ env.VSA_FOLDER }}/verification-summary-attestation-${{ steps.verify-image.outputs.result-status }}.json
          push-to-registry: true
          github-token: ${{ inputs.github-token || github.token }}
      - name: Attest to VSA for Blob
        if: ${{ inputs.build-type == 'blob' }}
        id: attest-vsa-blob
        uses: actions/attest@e59cbc1ad1ac2d59339667419eb8cdde6eb61e3d # v3.2.0
        with:
          subject-path: ${{ env.ARTIFACTS_FOLDER }}
          predicate-type: 'https://slsa.dev/verification_summary/v1'
          predicate-path: ${{ env.VSA_FOLDER }}/verification-summary-attestation-${{ steps.verify-blob.outputs.result-status }}.json
          push-to-registry: false
          github-token: ${{ inputs.github-token || github.token }}
      - name: Rename VSA Bundle
        id: rename-vsa-bundle
        run: |
          if [ "${{ inputs.build-type }}" = "image" ]; then
            BUNDLE_DIR=$(dirname "${{ steps.attest-vsa-image.outputs.bundle-path }}")
            VSA_PATH="$BUNDLE_DIR/vsa-${{ steps.verify-image.outputs.result-status }}.json"
            mv "${{ steps.attest-vsa-image.outputs.bundle-path }}" "$VSA_PATH"
          else
            BUNDLE_DIR=$(dirname "${{ steps.attest-vsa-blob.outputs.bundle-path }}")
            VSA_PATH="$BUNDLE_DIR/vsa-${{ steps.verify-blob.outputs.result-status }}.json"
            mv "${{ steps.attest-vsa-blob.outputs.bundle-path }}" "$VSA_PATH"
          fi
          echo "vsa-bundle-path=$VSA_PATH" >> $GITHUB_OUTPUT
      - name: Upload Signed VSA Bundle Artifact
        id: upload-vsa-artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: verification-summary-attestation-high-perms
          path: ${{ steps.rename-vsa-bundle.outputs.vsa-bundle-path }}
          if-no-files-found: error
