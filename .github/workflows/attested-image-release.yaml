name: Attested Image Release

on:
  workflow_call:

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:

  attest-sbom:
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        id: generate-sbom
        with:
          image: ghcr.io/${{ github.repository }}@${{ inputs.image_digest }}
          format: 'cyclonedx-json'
          output-file: 'sbom.cyclonedx.json'
      - name: Generate SBOM attestation
        uses: actions/attest-sbom@v1
        id: attest-sbom
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ inputs.image_digest }}
          sbom-path: 'sbom.cyclonedx.json'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          push-to-registry: true

  attest-blob:
    runs-on: ubuntu-latest
    needs: [attest-sbom]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate Metadata Attestation
        run: |
          echo '{
            "_type": "https://in-toto.io/Statement/v0.1",
            "predicateType": "https://cosign.sigstore.dev/attestation/v1",
            "subject": [
              {
                "name": "${{ github.repository }}",
                "digest": {
                  "sha256": "${{ github.sha }}"
                }
              }
            ],
            "predicate": {
              "metaData": {
                "workflowRunId": "${{ github.run_id }}",
                "commitSHA": "${{ github.sha }}",
                "githubServerURL": "${{ github.server_url }}",
                "repository": "${{ github.repository }}",
                "repositoryId": "${{ github.repository_id }}",
                "owner": "${{ github.repository_owner }}",
                "ownerId": "${{ github.repository_owner_id }}",
                "actor": "${{ github.actor }}",
                "event": "${{ github.event_name }}",
                "ref": "${{ github.ref }}",
                "jobId": "${{ github.job }}",
                "runNumber": "${{ github.run_number }}",
                "workflowRefPath": "${{ github.workflow_ref }}",
                "action": "${{ github.action }}",
                "runnerOS": "${{ runner.os }}",
                "runnerName": "${{ runner.name }}",
                "commitTimestamp": "${{ github.event.head_commit.timestamp }}"
              }
            }
          }' > metadata.json
        shell: bash
      - run: cat metadata.json | jq -r
      - uses: actions/attest@v1
        with:
          predicate-type: 'https://cosign.sigstore.dev/attestation/v1'
          predicate-path: 'metadata.json'
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ inputs.image_digest }}
          push-to-registry: true

  verify:
    runs-on: ubuntu-latest
    needs: [attest-sbom, attest-blob]
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Verify artifact attestation
        id: verify
        run: |
          gh attestation \
          verify \
          oci://ghcr.io/${{ github.repository }}@${{ inputs.image_digest }} \
          -o liatrio \
          --format json

  run-opa:
    runs-on: ubuntu-latest
    needs: [attest-sbom, attest-blob, verify]
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup OPA
        uses: open-policy-agent/setup-opa@v2
        with:
          version: 0.67.1
      - name: Download artifact attestation
        id: download-attestations
        run: |
          gh attestation \
          download \
          oci://ghcr.io/${{ github.repository }}@${{ inputs.image_digest }} \
          -o liatrio
      - name: Download Policy Bundle
        run: |
          asset_url=$(curl -L -H "Authorization: Bearer ${{ secrets.READ_CONTENT_GITHUB_TOKEN }}" https://api.github.com/repos/liatrio/demo-gh-autogov-policy-library/releases/latest | jq -r '.assets[] | select(.name == "bundle.tar.gz") | .url')
          curl -L -o bundle.tar.gz -H "Accept: application/octet-stream" -H "Authorization: Bearer ${{ secrets.READ_CONTENT_GITHUB_TOKEN }}" $asset_url
      - name: Run OPA Evals
        id: run-opa-evals
        run: |
          opa eval \
          --fail \
          --input ${{ inputs.image_digest }}.jsonl \
          --bundle bundle.tar.gz \
          "data.governance.all_passed" > policy-evaluation-raw.json
          cat policy-evaluation-raw.json
      - name: Save evaluation results as artifact
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: results
          path: policy-evaluation-raw.json

  results:
    runs-on: ubuntu-latest
    needs: [attest-sbom, attest-blob, verify, run-opa]
    steps:
      - name: Download Results
        uses: actions/download-artifact@v4
        with:
          name: results
          path: .
      - name: Format Results
        run: |
          jq '{
            result: (
              if ([.result[].expressions[].value] | any(. == false)) then "FAILED" else "PASSED" end
            ),
            violations: (
              [.result[].expressions[]
                | select(.value == false)
                | {
                    "Policy Set": (.text | split(".") | .[1] + "." + .[2]),
                    "Results": .value
                  }
              ]
            )
          }' policy-evaluation-raw.json > policy-evaluation.json
          cat policy-evaluation.json
          jq -s 'reduce .[] as $item ({}; . * $item)' policy-evaluation.json > results
          cat results

          echo "### Policy Evaluation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### Result: $(jq -r '.result' results)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
      - name: Save evaluation results as artifact
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: results_artifact
          path: results

  release:
    runs-on: ubuntu-latest
    needs: [attest-sbom, attest-blob, verify, results]
    permissions:
      contents: write
    steps:
      - name: Run go-semantic-release
        uses: go-semantic-release/action@v1
        id: go-semantic-release
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          changelog-generator-opt: emojis=true
          allow-initial-development-versions: true

      - name: Get release
        if: steps.go-semantic-release.outputs.version != ''
        id: get_release
        run: |
          response=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" -H "Accept: application/vnd.github.v3+json" "https://api.github.com/repos/${{ github.repository }}/releases/tags/v${{ steps.go-semantic-release.outputs.version}}")
          upload_url=$(echo "$response" | jq -r '.upload_url')
          if [ "$upload_url" = "null" ]; then
            echo "::error::Upload URL is null for the v${{steps.go-semantic-release.outputs.version }} release."
            exit 1
          fi
          echo "UPLOAD_URL=$upload_url" >> $GITHUB_ENV

      - name: Download policy evaluation artifact
        if: steps.go-semantic-release.outputs.version != ''
        uses: actions/download-artifact@v4
        with:
          name: results_artifact

      - name: Upload Release Asset
        if: steps.go-semantic-release.outputs.version != ''
        uses: actions/upload-release-asset@v1.0.2
        env:
          GITHUB_TOKEN: ${{ github.token }}
          UPLOAD_URL: ${{ env.UPLOAD_URL }}
        with:
          upload_url: ${{ env.UPLOAD_URL }}
          asset_path: results
          asset_name: results
          asset_content_type: application/json
