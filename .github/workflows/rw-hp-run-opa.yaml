name: OPA Evaluation High Permissions Reuseable Workflow

on:
  workflow_call:
    inputs:
      build-type:
        description: 'Specify the type of build: "image" or "blob".'
        required: true
        type: string
      subject-name:
        description: >
          Subject name as it should appear in the attestation. Required unless
          "subject-path" is specified, in which case it will be inferred from the
          path.
        default: ${{ github.repository }}
        required: false
        type: string
      image-digest:
        description: The digest of the image that was built and pushed
        default: ${{ inputs.build-type == 'image' && github.event.needs.build.outputs.image-digest }}
        required: false
        type: string
      registry:
        description: The container registry to use.
        default: ghcr.io
        required: false
        type: string
      blob-artifact-id:
        description: The artifact-id of the build artifacts.
        default: ${{ inputs.build-type == 'blob' && github.event.needs.build.outputs.blob-artifact-id }}
        type: string
      workflow-runner-label:
        description: The label of the workflow runner
        default: ubuntu-latest
        type: string
      opa-version:
        description: The OPA version to use.
        required: false
        type: string
        default: v1.1.0
      ignore-dependency-vulnerabilities:
        description: Whether to ignore dependency vulnerabilities during OPA evaluation.
        required: false
        type: boolean
        # defaults to true in workflows repo, false elsewhere
        default: ${{ github.repository == format('{0}/{1}', github.repository_owner, 'liatrio-gh-autogov-workflows') }}
      github-token:
        description: >
          The GitHub token set throughout the reuseable workflow including the composite (build) action.
        required: false
        type: string
    outputs:
      results-artifact-id:
        description: The artifact-id of the opa eval results artifact.
        value: ${{ jobs.run-opa-high-perms.outputs.results-artifact-id }}

permissions: {}

env:
  GH_TOKEN: ${{ inputs.github-token || github.token }}
  ARTIFACTS_FOLDER: ./artifacts
  ATTESTATIONS_FOLDER: ./attestations
  POLICY_REPO_NAME: liatrio-rego-policy-library

jobs:
  run-opa-high-perms:
    continue-on-error: true
    outputs:
      results-artifact-id: ${{ steps.upload-results.outputs.artifact-id }}
    permissions:
      attestations: read
      packages: read
      id-token: write
      actions: read
    runs-on: ${{ inputs.workflow-runner-label }}
    steps:
      - name: Fail if Runner is self-hosted
        if: ${{ runner.environment != 'github-hosted' }}
        run: |
          echo "Job is running on a self-hosted runner. Terminating job..."
          exit 1
      - name: Validate Inputs
        if: ${{ inputs.build-type == 'image' && (inputs.subject-name == '' || inputs.image-digest == '') }}
        run: |
          echo "Error: Both subject-name and image-digest are required for build-type 'image'."
          exit 1
      - name: Setup OPA
        if: ${{ runner.environment == 'github-hosted' }}
        uses: open-policy-agent/setup-opa@34a30e8a924d1b03ce2cf7abe97250bbb1f332b5 # v2.2.0
        with:
          version: ${{ inputs.opa-version }}
      - name: Login to GitHub Container Registry
        uses: docker/login-action@184bdaa0721073962dff0199f1fb9940f07167d1 # v3.5.0
        with:
          registry: ${{ inputs.registry }}
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Create Attestations and Artifacts Folders
        run: mkdir ${{ env.ATTESTATIONS_FOLDER }} && mkdir ${{ env.ARTIFACTS_FOLDER }}
      - name: Download Blob Artifact(s)
        if: ${{ inputs.build-type == 'blob' }}
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          github-token: ${{ inputs.github-token || github.token }}
          artifact-ids: ${{ inputs.blob-artifact-id }}
          path: ${{ env.ARTIFACTS_FOLDER }}
          merge-multiple: true
      - name: Download Blob Artifact Attestation(s)
        if: ${{ inputs.build-type == 'blob' }}
        run: |
          cd ${{ env.ATTESTATIONS_FOLDER }}
          find ../${{ env.ARTIFACTS_FOLDER }} -type f -exec gh attestation download {} --repo ${{ github.repository }} \;
      - name: Download Image Artifact Attestation(s)
        if: ${{ inputs.build-type == 'image' }}
        run: |
          cd ${{ env.ATTESTATIONS_FOLDER }}
          gh attestation download \
            oci://${{ format('{0}/{1}@{2}', inputs.registry, github.repository, inputs.image-digest) }} \
            --repo ${{ github.repository }}
      - name: Process Sigstore Bundle(s)
        run: |
          set +x
          echo "Processing Sigstore bundles from ${{ env.ATTESTATIONS_FOLDER }}"
          if ! find ${{ env.ATTESTATIONS_FOLDER }} -name "*.jsonl" -exec cat {} \; | jq -s . > ${{ env.ATTESTATIONS_FOLDER }}/sigstore-bundle.json; then
            echo "Error: Failed to process Sigstore bundles"
            exit 1
          fi
          find ${{ env.ATTESTATIONS_FOLDER }} -name "*.jsonl" -delete
          echo "Processed Sigstore bundle"
      - uses: octo-sts/action@6177b4481c00308b3839969c3eca88c96a91775f # v1.0.0
        id: octo-sts
        with:
          scope: liatrio
          identity: autogov-infra
      - name: Setup ORA
        uses: oras-project/setup-oras@8d34698a59f5ffe24821f0b48ab62a3de8b64b20 # v1.2.3
      - name: Download Policy Bundle
        env:
          GH_TOKEN: ${{ steps.octo-sts.outputs.token }}
        run: |
          set +x
          oras pull \
            ghcr.io/${{ github.repository_owner }}/${{ env.POLICY_REPO_NAME }}:latest
      - name: Download Policy Schemas
        env:
          GH_TOKEN: ${{ steps.octo-sts.outputs.token }}
        run: |
          gh release download \
            --repo ${{ github.repository_owner }}/${{ env.POLICY_REPO_NAME }} \
            --pattern "schemas.tar.gz"
          mkdir -p schemas
          tar -xzf schemas.tar.gz -C schemas
      - name: Configure Dependency Vulnerability Handling
        if: ${{ inputs.ignore-dependency-vulnerabilities }}
        run: |
          echo "Ignoring dependency vulnerabilities - creating vulnerability-ignored-bundle.json"
          jq 'map(. + {"ignore_dependency_vulnerabilities": true})' \
            ${{ env.ATTESTATIONS_FOLDER }}/sigstore-bundle.json \
            > ${{ env.ATTESTATIONS_FOLDER }}/vulnerability-ignored-bundle.json
          echo "Vulnerability-ignored Sigstore bundle created successfully"
      - name: Run OPA Evals
        id: run-opa
        env:
          OPA_INPUT: ${{ env.ATTESTATIONS_FOLDER }}/${{ inputs.ignore-dependency-vulnerabilities && 'vulnerability-ignored-bundle.json' || 'sigstore-bundle.json' }}
        run: |
          set -x
          echo "Using input file: $OPA_INPUT"
          opa eval \
            --fail \
            --input "$OPA_INPUT" \
            --schema schemas \
            --bundle "bundle.tar.gz" \
            "data.governance.allow" >\
          policy-evaluation.json
          cat policy-evaluation.json | jq -r
      - name: Output Violations if failed
        if: ${{ failure() && steps.run-opa.outcome == 'failure' }}
        env:
          OPA_INPUT: ${{ env.ATTESTATIONS_FOLDER }}/${{ inputs.ignore-dependency-vulnerabilities && 'vulnerability-ignored-bundle.json' || 'sigstore-bundle.json' }}
        run: |
          set -x
          echo "Using input file: $OPA_INPUT"
          opa eval \
            --fail \
            --input "$OPA_INPUT" \
            --bundle "bundle.tar.gz" \
            --schema schemas \
            "data.governance.violations" >\
          policy-evaluation.json
          cat policy-evaluation.json | jq -r
      - name: Format Results
        if: success() || failure()
        run: |
          RESULT_STATUS=$(jq -r 'if ([.result[].expressions[].value | recurse(.[]?) | arrays | length > 0] | any) then "FAILED" else "PASSED" end' policy-evaluation.json)
          echo "RESULT_STATUS=$RESULT_STATUS" >> $GITHUB_ENV
          jq --arg status "$RESULT_STATUS" '{
            result: $status,
            violations: (
              if ([.result[].expressions[].value | recurse(.[]?) | arrays | length > 0] | any) then
                [.result[].expressions[].value | recurse(.[]?) | objects | to_entries[] |
                  {policy: .key, message: .value | arrays | .[] | strings}]
              else
                []
              end
            )
          }' policy-evaluation.json > results-${RESULT_STATUS}
          cat results-${RESULT_STATUS} | jq -r
          echo "### Policy Evaluation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### Result: $(jq -r '.result' results-${RESULT_STATUS})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ $(jq '.violations | length' results-${RESULT_STATUS}) -gt 0 ]; then
              echo "#### Violations:" >> $GITHUB_STEP_SUMMARY
              jq -r '
              reduce .violations[] as $v ({}; .[$v.policy] += [$v.message])
              | to_entries[]
              | .key + ":\n" + (.value | map("- " + .) | join("\n")) + "\n"
              ' results-${RESULT_STATUS} >> $GITHUB_STEP_SUMMARY
          fi
      - name: Upload Results
        if: success() || failure()
        id: upload-results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ inputs.build-type == 'image' && 'image-results-' || inputs.build-type == 'blob' && 'blob-results-' }}${{ env.RESULT_STATUS }}
          path: results-${{ env.RESULT_STATUS }}
          if-no-files-found: error
