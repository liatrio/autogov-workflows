name: Release Reusable Workflow

on:
  workflow_call:
    inputs:
      branch:
        description: 'Branch to cut the release from (default: main).'
        required: false
        type: string
        default: main
      mutations-config:
        description: 'Path to the mutations config file (e.g. .autogov-release.yaml).'
        required: false
        type: string
        default: ''
      dry-run:
        description: 'Run in dry-run mode (no commits, tags, or releases created).'
        required: false
        type: boolean
        default: false
      autogov-version:
        description: 'The autogov release version to download and use.'
        required: false
        type: string
        default: v0.32.6
      vsa-artifact-id:
        description: 'The artifact ID of the VSA to upload as a release asset.'
        required: false
        type: string
        default: ''
      blob-artifact-id:
        description: 'Artifact ID of the blob to download and publish as a release asset.'
        required: false
        type: string
        default: ''
      workflow-runner-label:
        description: 'The label of the workflow runner.'
        required: false
        type: string
        default: ubuntu-latest
      github-token:
        description: >
          GitHub token used for the binary download when octo-sts-read-scope
          is empty. Leave empty to use github.token (suitable for public repos).
        required: false
        type: string
        default: ''
      octo-sts-read-scope:
        description: >
          octo-sts scope for the private-repo autogov CLI download. Leave empty
          to use github-token — correct for public repos.
        required: false
        type: string
        default: ''
      octo-sts-read-identity:
        description: octo-sts read identity (used only when octo-sts-read-scope is set).
        required: false
        type: string
        default: ''
      octo-sts-release-scope:
        description: >
          octo-sts scope for the write path (release cut commit/tag and asset
          upload). Defaults to liatrio. External orgs with a protected main must
          override this with their own scope whose octo-sts app is on the branch
          ruleset bypass list — github.token cannot bypass a ruleset.
        required: false
        type: string
        default: liatrio
      octo-sts-release-identity:
        description: octo-sts write identity for the release cut and asset upload.
        required: false
        type: string
        default: release-ops
    outputs:
      version:
        description: 'The version of the release that was cut.'
        value: ${{ jobs.release-cut-high-perms.outputs.version }}
      tag:
        description: 'The tag created for the release.'
        value: ${{ jobs.release-cut-high-perms.outputs.tag }}
      commit-sha:
        description: 'The SHA of the release commit.'
        value: ${{ jobs.release-cut-high-perms.outputs.commit-sha }}
      commit-verified:
        description: 'Whether the release commit is verified.'
        value: ${{ jobs.release-cut-high-perms.outputs.commit-verified }}

permissions: {}

jobs:
  release-cut-high-perms:
    runs-on: ${{ inputs.workflow-runner-label }}
    if: ${{ github.event_name == 'push' && github.ref == format('refs/heads/{0}', inputs.branch) }}
    permissions:
      contents: write
      id-token: write
      actions: read
    outputs:
      version: ${{ steps.release-cut.outputs.version }}
      tag: ${{ steps.release-cut.outputs.tag }}
      commit-sha: ${{ steps.release-cut.outputs.commit-sha }}
      commit-verified: ${{ steps.verify-signature.outputs.verified }}
    steps:
      - name: Fail if Runner is self-hosted
        if: ${{ runner.environment != 'github-hosted' }}
        run: |
          echo "Job is running on a self-hosted runner. Terminating job..."
          exit 1

      - name: Checkout code
        if: ${{ runner.environment == 'github-hosted' }}
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: octo-sts/action@f603d3be9d8dd9871a265776e625a27b00effe05 # v1.1.1
        id: octo-sts-read
        if: ${{ inputs.octo-sts-read-scope != '' }}
        with:
          scope: ${{ inputs.octo-sts-read-scope }}
          identity: ${{ inputs.octo-sts-read-identity }}

      - name: Install autogov
        env:
          GH_TOKEN: ${{ inputs.octo-sts-read-scope == '' && (inputs.github-token || github.token) || steps.octo-sts-read.outputs.token }}
        run: |
          gh release download ${{ inputs.autogov-version }} \
            --repo liatrio/autogov \
            --pattern "autogov"
          chmod +x autogov
          sudo mv autogov /usr/local/bin/autogov

      - uses: octo-sts/action@f603d3be9d8dd9871a265776e625a27b00effe05 # v1.1.1
        id: octo-sts-release
        with:
          scope: ${{ inputs.octo-sts-release-scope }}
          identity: ${{ inputs.octo-sts-release-identity }}

      - name: Show release plan
        run: |
          echo "=== Release Plan ==="
          autogov release plan --repo . -o json
          echo ""
          autogov release plan --repo .

      # stage every release asset BEFORE the cut so a single `release cut --asset
      # ... --publish` uploads them while the release is still a draft, then flips
      # it to published — under GitHub immutable releases assets cannot be added or
      # clobbered after publish, so post-publish uploads would hard-fail.
      # stage UNDER $RUNNER_TEMP (off the worktree): `release cut --repo .` runs a
      # clean-worktree check in its default (auto) mode, so downloading these into
      # the checked-out tree would dirty it and fail the cut (autogov's own release
      # stages to $RUNNER_TEMP for the same reason). cert-identities.json stays at the
      # repo root because it is a tracked/committed file (does not dirty the tree).
      - name: Download VSA artifact
        if: ${{ inputs.vsa-artifact-id != '' && inputs.dry-run == false }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          github-token: ${{ github.token }}
          artifact-ids: ${{ inputs.vsa-artifact-id }}
          path: ${{ runner.temp }}/vsa
          merge-multiple: true

      - name: Download blob artifact
        if: ${{ inputs.blob-artifact-id != '' && inputs.dry-run == false }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          github-token: ${{ github.token }}
          artifact-ids: ${{ inputs.blob-artifact-id }}
          path: ${{ runner.temp }}/release-assets
          merge-multiple: true

      - name: Download attestation bundles
        # pull this run's verified attestation bundles so the release can ship the
        # full bundle for offline verify-from-release. a `pattern` download does not
        # fail on zero matches, so a build with no attestations just yields an empty
        # dir (assemble step skips); a REAL download failure must surface here rather
        # than silently shipping a truncated evidence bundle, so do NOT swallow it.
        if: ${{ inputs.dry-run == false }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          github-token: ${{ github.token }}
          pattern: '*-attestation-*-perms'
          path: ${{ runner.temp }}/attestation-bundles
      - name: Assemble full attestation bundle asset
        # concatenate every verified attestation bundle (build-provenance + sbom +
        # vuln/dep-scan + metadata + source-review) into one line-delimited file an
        # offline verifier re-evaluates against policy (autogov offline --attestations).
        # the *.jsonl filter naturally excludes the VSA artifact (a .json) the pattern
        # also matches. skip silently if none are present (e.g. a build with no attests).
        # written under $RUNNER_TEMP (off the worktree) so the cut's clean-tree check holds.
        if: ${{ inputs.dry-run == false }}
        run: |
          out="$RUNNER_TEMP/autogov.attestations.intoto.jsonl"
          rm -f "$out"
          count=0
          if [ -d "$RUNNER_TEMP/attestation-bundles" ]; then
            while IFS= read -r f; do
              cat "$f" >> "$out"
              [ -n "$(tail -c1 "$f")" ] && echo >> "$out"
              count=$((count + 1))
            done < <(find "$RUNNER_TEMP/attestation-bundles" -type f -name '*.jsonl' | sort)
          fi
          if [ "$count" -gt 0 ]; then
            echo "assembled $count attestation bundles into $out"
          else
            echo "::notice::no attestation bundles found; skipping full-bundle asset"
            rm -f "$out"
          fi

      - name: Run release cut
        id: release-cut
        env:
          GH_TOKEN: ${{ steps.octo-sts-release.outputs.token }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          ARGS=(--repo . --branch "${{ inputs.branch }}")

          if [ -n "${{ inputs.mutations-config }}" ]; then
            ARGS+=(--mutations-config "${{ inputs.mutations-config }}")
          fi

          if [ "${{ inputs.dry-run }}" == "true" ]; then
            ARGS+=(--dry-run)
          else
            ARGS+=(--publish)
          fi

          # append one --asset per staged file that actually exists + is non-empty
          # (the cut validates each path up front, so only pass present files): the
          # VSA file(s) + blob/release-assets staged under $RUNNER_TEMP, the assembled
          # full attestation bundle (also under $RUNNER_TEMP), and the committed signer
          # allowlist at the repo root. globs are expanded to concrete file paths.
          add_asset() {
            if [ -f "$1" ] && [ -s "$1" ]; then
              ARGS+=(--asset "$1")
              echo "staging asset: $1"
            fi
          }
          for d in "$RUNNER_TEMP/vsa" "$RUNNER_TEMP/release-assets"; do
            if [ -d "$d" ]; then
              while IFS= read -r f; do
                add_asset "$f"
              done < <(find "$d" -maxdepth 1 -type f | sort)
            fi
          done
          add_asset "cert-identities.json"
          add_asset "$RUNNER_TEMP/autogov.attestations.intoto.jsonl"

          echo "=== Running: autogov release cut ${ARGS[*]} -o json ==="
          OUTPUT=$(autogov release cut "${ARGS[@]}" -o json)
          echo "$OUTPUT"

          # check if no release was needed
          NO_RELEASE=$(echo "$OUTPUT" | jq -r '.no_release // false')
          if [ "$NO_RELEASE" == "true" ]; then
            REASON=$(echo "$OUTPUT" | jq -r '.reason // empty')
            echo "::notice::No release needed: ${REASON}"
            exit 0
          fi

          # parse outputs
          VERSION=$(echo "$OUTPUT" | jq -r '.version // empty')
          TAG=$(echo "$OUTPUT" | jq -r '.tag_name // empty')
          COMMIT_SHA=$(echo "$OUTPUT" | jq -r '.commit_sha // empty')
          RELEASE_ID=$(echo "$OUTPUT" | jq -r '.release_id // empty')

          {
            echo "version=${VERSION}"
            echo "tag=${TAG}"
            echo "commit-sha=${COMMIT_SHA}"
            echo "release-id=${RELEASE_ID}"
          } >> "$GITHUB_OUTPUT"

      - name: Verify commit signature
        id: verify-signature
        if: ${{ inputs.dry-run == false && steps.release-cut.outputs.commit-sha != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          COMMIT_SHA="${{ steps.release-cut.outputs.commit-sha }}"
          echo "=== Verifying commit ${COMMIT_SHA} ==="
          RESULT=$(gh api repos/${{ github.repository }}/commits/${COMMIT_SHA} \
            --jq '{verified: .commit.verification.verified, reason: .commit.verification.reason}')
          echo "$RESULT"

          VERIFIED=$(echo "$RESULT" | jq -r '.verified')
          echo "verified=${VERIFIED}" >> "$GITHUB_OUTPUT"

          if [ "$VERIFIED" != "true" ]; then
            echo "::error::Release commit is NOT verified!"
            exit 1
          fi
          echo "::notice::Release commit is verified ✅"

