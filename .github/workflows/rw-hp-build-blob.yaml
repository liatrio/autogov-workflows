name: Build Blob High Permissions Reuseable Workflow

on:
  workflow_call:
    inputs:
      subject-path:
        description: >
          Path to the artifact serving as the subject of the attestation. Must
          specify exactly one of "subject-path" or "subject-digest". May contain a
          glob pattern or list of paths (total subject count cannot exceed 2500).
          examples: https://github.com/actions/attest-build-provenance?tab=readme-ov-file#examples
        required: true
        type: string
      cert-identity:
        type: string
        description: >
          The certificate identity of the signer workflow, or builder, used in the verify job to ensure artifacts and attestations can be verified against the source repository and correct workflow using the gh-cli (e.g. --cert-identity flag). If verifying an image, the workflow name should be rw-<permissions_path>-attest-image.yaml, if verifying blob(s), the workflow name should be rw-<permissions_path>-attest-blob.yaml.
        required: true
      ignore-dependency-vulnerabilities:
        description: Whether to ignore dependency vulnerabilities during OPA evaluation.
        required: false
        type: boolean
        # defaults to true in workflows repo, false elsewhere
        default: ${{ github.repository == format('{0}/{1}', github.repository_owner, 'liatrio-gh-autogov-workflows') }}
      autogov-verify-version:
        description: The autogov-verify version to use.
        required: false
        type: string
        default: v0.4.4
      autogov-helper-version:
        description: The autogov-helper version to use.
        required: false
        type: string
        default: v0.4.2
      publish-attestations:
        description: Whether to publish attestations as release assets.
        required: false
        type: boolean
        default: true

permissions: {}

jobs:
  attest-blob: #blob
    permissions:
      id-token: write
      attestations: write
      contents: read
      actions: read
    uses: ./.github/workflows/rw-hp-attest-blob.yaml
    secrets: inherit
    with:
      subject-path: ${{ inputs.subject-path }}
      autogov-helper-version: ${{ inputs.autogov-helper-version }}

  verify-blob: #blob
    permissions:
      id-token: write
      attestations: read
      contents: read
      packages: read
      actions: read
    needs: [attest-blob]
    uses: ./.github/workflows/rw-hp-verify.yaml
    secrets: inherit
    with:
      build-type: blob
      blob-artifact-id: ${{ needs.attest-blob.outputs.blob-artifact-id }}
      cert-identity: ${{ inputs.cert-identity }}
      autogov-verify-version: ${{ inputs.autogov-verify-version }}

  run-opa-blob: #blob
    permissions:
      id-token: write
      attestations: read
      packages: read
      actions: read
    needs: [verify-blob, attest-blob]
    uses: ./.github/workflows/rw-hp-run-opa.yaml
    secrets: inherit
    with:
      build-type: blob
      blob-artifact-id: ${{ needs.attest-blob.outputs.blob-artifact-id }}
      ignore-dependency-vulnerabilities: ${{ inputs.ignore-dependency-vulnerabilities }}

  release-blob: #blob
    permissions:
      contents: write
      id-token: write
      actions: read
    needs: [verify-blob, attest-blob, run-opa-blob]
    if: ${{ inputs.release-blob }}
    uses: ./.github/workflows/rw-hp-release.yaml
    secrets: inherit
    with:
      build-type: blob
      attest-build-attestation-artifact-id: ${{ needs.attest-blob.outputs.attest-build-attestation-artifact-id }}
      attest-metadata-attestation-artifact-id: ${{ needs.attest-blob.outputs.attest-metadata-attestation-artifact-id }}
      attest-sbom-attestation-artifact-id: ${{ needs.attest-blob.outputs.attest-sbom-attestation-artifact-id }}
      attest-dependency-scan-attestation-artifact-id: ${{ needs.attest-blob.outputs.attest-dependency-scan-attestation-artifact-id }}
      blob-artifact-id: ${{ needs.attest-blob.outputs.blob-artifact-id }}
      results-artifact-id: ${{ needs.run-opa-blob.outputs.results-artifact-id }}
      publish-attestations: ${{ inputs.publish-attestations }}
