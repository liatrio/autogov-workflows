name: Attest Blob Reusable Workflow

on:
  workflow_call:
    inputs:
      subject-path:
        description: >
          Path to the artifact serving as the subject of the attestation. Must
          specify exactly one of "subject-path" or "subject-digest". May contain a
          glob pattern or list of paths (total subject count cannot exceed 2500).
          examples: https://github.com/actions/attest-build-provenance?tab=readme-ov-file#examples
        required: true
        type: string
      blob-artifact-name:
        description: >
          The name of artifact for the blob(s) built from the build-blob action found in
          ./.github/actions/build-blob/action.yaml.
        default: blob-build-artifact-high-perms
        required: false
        type: string
      show-summary:
        description: >
          Whether to attach a list of generated attestations to the workflow run
          summary page. Defaults to true.
        default: true
        required: false
        type: boolean
      workflow-runner-label:
        description: >
          The label used for runner/OS selection
          examples: https://docs.github.com/en/actions/writing-workflows/choosing-where-your-workflow-runs/choosing-the-runner-for-a-job#example-specifying-an-operating-system.
        required: false
        default: ubuntu-latest
        type: string
      github-token:
        description: >
          The GitHub token set throughout the reusable workflow including the composite (build) action.
        required: false
        type: string
      autogov-version:
        description: The autogov version to use.
        required: false
        type: string
        default: v0.28.0
    outputs:
      blob-artifact-id:
        description: The artifact-id of the blob artifact(s).
        value: ${{ jobs.build-high-perms.outputs.blob-artifact-id }}
      attest-build-attestation-artifact-id:
        description: The artifact-id of the build provenance attestation artifact.
        value: ${{ jobs.attest-build-high-perms.outputs.provenance-artifact-id }}
      attest-metadata-attestation-artifact-id:
        description: The artifact-id of the custom metadata attestation artifact.
        value: ${{ jobs.attest-metadata-high-perms.outputs.metadata-artifact-id }}
      attest-sbom-attestation-artifact-id:
        description: The artifact-id of the SBOM attestation artifact.
        value: ${{ jobs.attest-sbom-high-perms.outputs.sbom-artifact-id }}
      attest-dependency-scan-attestation-artifact-id:
        description: The artifact-id of the dependency scan attestation artifact.
        value: ${{ jobs.attest-dependency-scan-high-perms.outputs.dependency-scan-artifact-id }}
      attest-source-review-attestation-artifact-id:
        description: The artifact-id of the source-review (PR-approval) attestation artifact.
        value: ${{ jobs.attest-source-review-high-perms.outputs.source-review-artifact-id }}

permissions: {}

env:
  GH_TOKEN: ${{ inputs.github-token || github.token }}
  ARTIFACTS_FOLDER: ./artifacts
  ATTESTATIONS_FOLDER: ./attestations
  POLICY_REF: https://github.com/liatrio/autogov-policy-library

jobs:
  build-high-perms:
    permissions:
      contents: read
      artifact-metadata: write
    runs-on: ${{ inputs.workflow-runner-label }}
    outputs:
      blob-artifact-id: ${{ steps.upload-blob.outputs.artifact-id }}
    steps:
      - name: Fail if Runner is self-hosted
        if: ${{ runner.environment != 'github-hosted' }}
        run: |
          echo "Job is running on a self-hosted runner. Terminating job..."
          exit 1
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
      - name: Build Blob
        if: ${{ runner.environment == 'github-hosted' }}
        id: build-blob
        uses: ./.github/actions/build-blob
      - name: Upload Blob
        id: upload-blob
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ inputs.blob-artifact-name }}
          path: ${{ inputs.subject-path }}
          if-no-files-found: error

  attest-build-high-perms:
    runs-on: ${{ inputs.workflow-runner-label }}
    needs: build-high-perms
    permissions:
      id-token: write
      attestations: write
      contents: read
      actions: read
      artifact-metadata: write
    env:
      ARTIFACT_ID: ${{ needs.build-high-perms.outputs.blob-artifact-id }}
    outputs:
      provenance-artifact-id: ${{ steps.upload-provenance.outputs.artifact-id }}
    steps:
      - name: Fail if Runner is self-hosted
        if: ${{ runner.environment != 'github-hosted' }}
        run: |
          echo "Job is running on a self-hosted runner. Terminating job..."
          exit 1
      - name: Download Blob Artifact(s)
        if: ${{ runner.environment == 'github-hosted' }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          github-token: ${{ inputs.github-token || github.token }}
          artifact-ids: ${{ env.ARTIFACT_ID }}
          path: ${{ env.ARTIFACTS_FOLDER }}
          merge-multiple: true
      - name: Attest Provenance
        id: attest-build-provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: ${{ env.ARTIFACTS_FOLDER }}
          github-token: ${{ inputs.github-token || github.token }}
          push-to-registry: false
      - name: Rename Provenance Bundle
        run: |
          mkdir ${{ env.ATTESTATIONS_FOLDER }}
          mv ${{ steps.attest-build-provenance.outputs.bundle-path }} ${{ env.ATTESTATIONS_FOLDER }}/attest-build-provenance-attestation.jsonl
      - name: Upload Provenance Sigstore Bundle
        id: upload-provenance
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: blob-build-provenance-attestation-high-perms
          path: ${{ env.ATTESTATIONS_FOLDER }}/attest-build-provenance-attestation.jsonl
          if-no-files-found: error

  attest-metadata-high-perms:
    runs-on: ${{ inputs.workflow-runner-label }}
    needs: build-high-perms
    permissions:
      id-token: write
      attestations: write
      contents: read
      actions: read
      artifact-metadata: write
    env:
      ARTIFACT_ID: ${{ needs.build-high-perms.outputs.blob-artifact-id }}
    outputs:
      metadata-artifact-id: ${{ steps.upload-metadata.outputs.artifact-id }}
    steps:
      - name: Fail if Runner is self-hosted
        if: ${{ runner.environment != 'github-hosted' }}
        run: |
          echo "Job is running on a self-hosted runner. Terminating job..."
          exit 1
      - name: Download Blob Artifact(s)
        if: ${{ runner.environment == 'github-hosted' }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          github-token: ${{ inputs.github-token || github.token }}
          artifact-ids: ${{ env.ARTIFACT_ID }}
          path: ${{ env.ARTIFACTS_FOLDER }}
          merge-multiple: true
      - uses: octo-sts/action@f603d3be9d8dd9871a265776e625a27b00effe05 # v1.1.1
        id: octo-sts
        with:
          scope: liatrio
          identity: autogov-infra
      - name: Install autogov
        env:
          GH_TOKEN: ${{ steps.octo-sts.outputs.token }}
        run: |
          gh release download ${{ inputs.autogov-version }} \
            --repo liatrio/autogov \
            --pattern "autogov"
          chmod +x autogov
      - name: Generate Metadata Attestation
        env:
          GITHUB_WORKFLOW_INPUTS: ${{ toJson(inputs) }}
        run: |
          set +x
          ./autogov predicate metadata \
            --output metadata.json \
            --type blob \
            --subject-path ${{ env.ARTIFACTS_FOLDER }}
          cat metadata.json
      - name: Attest Metadata
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        id: attest-metadata
        with:
          subject-path: ${{ env.ARTIFACTS_FOLDER }}
          predicate-type: 'https://autogov.dev/attestation/metadata/v1'
          predicate-path: metadata.json
          push-to-registry: false
      - name: Rename Metadata Bundle
        run: |
          mkdir ${{ env.ATTESTATIONS_FOLDER }}
          mv ${{ steps.attest-metadata.outputs.bundle-path }} ${{ env.ATTESTATIONS_FOLDER }}/attest-metadata-attestation.jsonl
      - name: Upload Metadata Sigstore Bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        id: upload-metadata
        with:
          name: blob-metadata-attestation-high-perms
          path: ${{ env.ATTESTATIONS_FOLDER }}/attest-metadata-attestation.jsonl
          if-no-files-found: error

  attest-sbom-high-perms:
    runs-on: ${{ inputs.workflow-runner-label }}
    needs: build-high-perms
    permissions:
      id-token: write
      attestations: write
      contents: read
      actions: read
      artifact-metadata: write
    env:
      ARTIFACT_ID: ${{ needs.build-high-perms.outputs.blob-artifact-id }}
    outputs:
      sbom-artifact-id: ${{ steps.upload-sbom.outputs.artifact-id }}
    steps:
      - name: Fail if Runner is self-hosted
        if: ${{ runner.environment != 'github-hosted' }}
        run: |
          echo "Job is running on a self-hosted runner. Terminating job..."
          exit 1
      - name: Download Blob Artifact(s)
        if: ${{ runner.environment == 'github-hosted' }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          github-token: ${{ inputs.github-token || github.token }}
          artifact-ids: ${{ env.ARTIFACT_ID }}
          path: ${{ env.ARTIFACTS_FOLDER }}
          merge-multiple: true
      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: ${{ env.ARTIFACTS_FOLDER }}
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json
          upload-release-assets: false
          upload-artifact: false
          github-token: ${{ inputs.github-token || github.token }}
      - name: Log SBOM File
        run: cat sbom.cyclonedx.json | jq -r
      - name: Generate SBOM attestation
        id: attest-sbom
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4.1.0
        with:
          subject-path: ${{ env.ARTIFACTS_FOLDER }}
          sbom-path: sbom.cyclonedx.json
          github-token: ${{ inputs.github-token || github.token }}
          push-to-registry: false
      - name: Rename SBOM Bundle
        run: |
          mkdir ${{ env.ATTESTATIONS_FOLDER }}
          mv ${{ steps.attest-sbom.outputs.bundle-path }} ${{ env.ATTESTATIONS_FOLDER }}/attest-sbom-attestation.jsonl
      - name: Upload SBOM Attestation
        id: upload-sbom
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: blob-sbom-attestation-high-perms
          path: ${{ env.ATTESTATIONS_FOLDER }}/attest-sbom-attestation.jsonl
          if-no-files-found: error

  attest-dependency-scan-high-perms:
    runs-on: ${{ inputs.workflow-runner-label }}
    needs: build-high-perms
    permissions:
      id-token: write
      attestations: write
      contents: read
      actions: read
      artifact-metadata: write
    env:
      ARTIFACT_ID: ${{ needs.build-high-perms.outputs.blob-artifact-id }}
    outputs:
      dependency-scan-artifact-id: ${{ steps.upload-dependency-scan.outputs.artifact-id }}
    steps:
      - name: Fail if Runner is self-hosted
        if: ${{ runner.environment != 'github-hosted' }}
        run: |
          echo "Job is running on a self-hosted runner. Terminating job..."
          exit 1
      - name: Download Blob Artifact(s)
        if: ${{ runner.environment == 'github-hosted' }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          github-token: ${{ inputs.github-token || github.token }}
          artifact-ids: ${{ env.ARTIFACT_ID }}
          path: ${{ env.ARTIFACTS_FOLDER }}
          merge-multiple: true
      - name: Scan current project
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        id: anchore-scan
        with:
          path: ${{ env.ARTIFACTS_FOLDER }}
          output-format: json
          output-file: results.json
          fail-build: false
      - uses: octo-sts/action@f603d3be9d8dd9871a265776e625a27b00effe05 # v1.1.1
        id: octo-sts
        with:
          scope: liatrio
          identity: autogov-infra
      - name: Install autogov
        env:
          GH_TOKEN: ${{ steps.octo-sts.outputs.token }}
        run: |
          gh release download ${{ inputs.autogov-version }} \
            --repo liatrio/autogov \
            --pattern "autogov"
          chmod +x autogov
      - name: Generate Dependency Scan Attestation
        run: |
          set +x
          ./autogov predicate depscan \
            --type blob \
            --results-path results.json \
            --subject-path ${{ env.ARTIFACTS_FOLDER }} \
            --output depscan.json
          cat depscan.json
      - name: Attest Dependency Scan
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        id: attest-dep-scan
        with:
          predicate-type: 'https://in-toto.io/attestation/vulns/v0.2'
          predicate-path: depscan.json
          push-to-registry: false
          subject-path: ${{ env.ARTIFACTS_FOLDER }}
      - name: Rename Dependency Scan Bundle
        run: |
          mkdir ${{ env.ATTESTATIONS_FOLDER }}
          mv ${{ steps.attest-dep-scan.outputs.bundle-path }} ${{ env.ATTESTATIONS_FOLDER }}/attest-dep-scan-attestation.jsonl
      - name: Upload Dependency Scan Sigstore Bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        id: upload-dependency-scan
        with:
          name: blob-dep-scan-attestation-high-perms
          path: ${{ env.ATTESTATIONS_FOLDER }}/attest-dep-scan-attestation.jsonl
          if-no-files-found: error

  attest-source-review-high-perms:
    runs-on: ${{ inputs.workflow-runner-label }}
    needs: build-high-perms
    permissions:
      id-token: write
      attestations: write
      contents: read
      actions: read
      # pull-requests:read lets autogov read this repo's PR reviews for the built
      # commit. Branch-protection thresholds would additionally need
      # Administration:read (which github.token lacks) — they are best-effort, so
      # the gate bars on its own min_approvals, not on the discovered required count.
      pull-requests: read
      artifact-metadata: write
    env:
      ARTIFACT_ID: ${{ needs.build-high-perms.outputs.blob-artifact-id }}
    outputs:
      source-review-artifact-id: ${{ steps.upload-source-review.outputs.artifact-id }}
    steps:
      - name: Fail if Runner is self-hosted
        if: ${{ runner.environment != 'github-hosted' }}
        run: |
          echo "Job is running on a self-hosted runner. Terminating job..."
          exit 1
      - name: Download Blob Artifact(s)
        if: ${{ runner.environment == 'github-hosted' }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          github-token: ${{ inputs.github-token || github.token }}
          artifact-ids: ${{ env.ARTIFACT_ID }}
          path: ${{ env.ARTIFACTS_FOLDER }}
          merge-multiple: true
      - uses: octo-sts/action@f603d3be9d8dd9871a265776e625a27b00effe05 # v1.1.1
        id: octo-sts
        with:
          scope: liatrio
          identity: autogov-infra
      - name: Install autogov
        env:
          GH_TOKEN: ${{ steps.octo-sts.outputs.token }}
        run: |
          gh release download ${{ inputs.autogov-version }} \
            --repo liatrio/autogov \
            --pattern "autogov"
          chmod +x autogov
      - name: Generate Source Review Attestation
        env:
          # token for the GitHub PR-reviews API on the source repo (pull-requests +
          # contents read, declared above). NOT the octo-sts token, which is scoped
          # for the cross-repo binary download.
          GITHUB_TOKEN: ${{ inputs.github-token || github.token }}
        run: |
          set +x
          ./autogov predicate source-review \
            --repo "${{ github.repository }}" \
            --commit-sha "${{ github.sha }}" \
            --ref "${{ github.ref }}" \
            --type blob \
            --subject-path ${{ env.ARTIFACTS_FOLDER }} \
            --output source-review.json
          cat source-review.json
      - name: Attest Source Review
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        id: attest-source-review
        with:
          predicate-type: 'https://autogov.dev/attestation/source-review/v0.1'
          predicate-path: source-review.json
          push-to-registry: false
          subject-path: ${{ env.ARTIFACTS_FOLDER }}
      - name: Rename Source Review Bundle
        run: |
          mkdir ${{ env.ATTESTATIONS_FOLDER }}
          mv ${{ steps.attest-source-review.outputs.bundle-path }} ${{ env.ATTESTATIONS_FOLDER }}/attest-source-review-attestation.jsonl
      - name: Upload Source Review Sigstore Bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        id: upload-source-review
        with:
          name: blob-source-review-attestation-high-perms
          path: ${{ env.ATTESTATIONS_FOLDER }}/attest-source-review-attestation.jsonl
          if-no-files-found: error
